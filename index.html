const el=(tag,attrs,...kids)=>{
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const k of kids){if(k==null)continue;e.appendChild(typeof k==='string'?document.createTextNode(k):k);}
  return e;
};

// ── XML PARSER ────────────────────────────────────────────────────────────────
function parseNFeXML(xmlText){
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(xmlText,"text/xml");
    const get=(tag)=>{const n=doc.getElementsByTagName(tag)[0];return n?n.textContent:null;};
    const volumes=doc.getElementsByTagName('vol');
    let totalVol=0,totalPeso=0;
    for(const v of volumes){
      const qVol=v.getElementsByTagName('qVol')[0];
      const pesoB=v.getElementsByTagName('pesoB')[0];
      if(qVol)totalVol+=parseInt(qVol.textContent)||0;
      if(pesoB)totalPeso+=parseFloat(pesoB.textContent)||0;
    }
    const dets=doc.getElementsByTagName('det');
    let totalItens=0;
    for(const d of dets)totalItens++;
    return{
      numero:get('nNF'),
      serie:get('serie'),
      emitente:get('xNome'),
      cnpjEmit:get('CNPJ'),
      destinatario:get('xNome'),
      valor:get('vNF'),
      volumes:totalVol||totalItens,
      peso:totalPeso,
      itens:totalItens,
      chave:get('chNFe'),
      dataEmissao:get('dhEmi'),
      valid:true
    };
  }catch(e){return{valid:false};}
}

async function readFileAsText(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsText(file);
  });
}

// ── DAYS REMAINING ─────────────────────────────────────────────────────────────
function daysRemaining(dateStr){
  if(!dateStr)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(dateStr);target.setHours(0,0,0,0);
  return Math.round((target-today)/(1000*60*60*24));
}

function renderDashContent(){
  if(!dashContentEl)return;
  const u=APP_STATE.user;const isAdmin=u.type==='admin';

  let filtered=dash.requests.filter(r=>{
    const mf=dash.filter==='all'||r.status===dash.filter;
    const ms=!dash.search||r.nf.includes(dash.search)||r.user_name?.toLowerCase().includes(dash.search.toLowerCase())||(r.xml_data?.emitente||'').toLowerCase().includes(dash.search.toLowerCase());
    let md=true;
    if(dash.dateFrom)md=md&&r.created_at>=dash.dateFrom;
    if(dash.dateTo)md=md&&r.created_at<=dash.dateTo+'T23:59:59';
    return mf&&ms&&md;

  const counts={};

  const dateTo=el('input',{type:'date',style:'padding:10px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;outline:none;background:#fff',title:'Data final'});

  dateTo.addEventListener('change',e=>{dash.dateTo=e.target.value;renderDashContent();});

      el('button',{'class':'btn btn-secondary',onclick:showTutorial,title:'Ver tutorial',style:'padding:10px'},'❓')

      el('div',{style:'color:#64748B;font-size:16px;font-weight:600'},'Nenhuma solicitação encontrada'),

        if(days<0)dbg='background:#FEF2F2;color:#EF4444';
        else if(days<=2)dbg='background:#FFFBEB;color:#D97706';
        else dbg='background:#ECFDF5;color:#065F46';
        top.append(el('span',{'class':'deadline-badge',style:dbg},days<0?`${Math.abs(days)}d atraso`:days===0?'Hoje':days===1?'Amanhã':`${days}d`));

      const sub=el('div',{style:'font-size:12px;color:#94A3B8'},fmt(req.created_at));

      card.append(left,badge);listEl.append(card);
    }
  }
  dashContentEl.replaceChildren(statsRow,toolbar,listEl);
}

// ── FILE UPLOAD HELPER ─────────────────────────────────────────────────────────
function makeFileZone(label,tipo,accept,fileArr,onUpdate){
  const zone=document.createElement('div');
  zone.style.marginBottom='16px';

  const lbl=document.createElement('label');
  lbl.style.cssText='display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px';
  lbl.textContent=label;
  zone.appendChild(lbl);

  const dropArea=document.createElement('div');
  dropArea.className='file-drop';
  dropArea.style.cursor='pointer';

  const icon=document.createElement('span');
  icon.style.fontSize='24px';
  icon.textContent=tipo==='nf'?'🧾':'📄';

  const txt=document.createElement('span');
  txt.style.cssText='font-size:13px;color:#64748B;font-weight:500';
  txt.textContent='Clique para anexar '+(tipo==='nf'?'Nota Fiscal':'XML');

  const hint=document.createElement('span');
  hint.style.cssText='font-size:11px;color:#94A3B8';
  hint.textContent='PDF, XML, JPG, PNG (máx. 50MB)';

  const fi=document.createElement('input');
  fi.type='file';
  fi.multiple=true;
  fi.accept=accept;
  fi.style.display='none';

  dropArea.appendChild(icon);
  dropArea.appendChild(txt);
  dropArea.appendChild(hint);
  dropArea.appendChild(fi);
  dropArea.addEventListener('click',function(){fi.click();});
  zone.appendChild(dropArea);

  const listEl=document.createElement('div');
  listEl.style.marginTop='8px';
  zone.appendChild(listEl);

  function refresh(){
    while(listEl.firstChild)listEl.removeChild(listEl.firstChild);
    fileArr.forEach(function(f,i){
      const item=document.createElement('div');
      item.className='file-item';
      const name=document.createElement('span');
      name.style.cssText='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1';
      name.textContent=(tipo==='nf'?'🧾':'📄')+' '+f.name;
      const rmBtn=document.createElement('button');
      rmBtn.style.cssText='background:none;border:none;color:#EF4444;cursor:pointer;font-size:16px;flex-shrink:0;padding:0 4px';
      rmBtn.textContent='×';
      rmBtn.addEventListener('click',function(e){
        e.preventDefault();e.stopPropagation();
        fileArr.splice(i,1);
        refresh();
        if(onUpdate)onUpdate();
      });
      item.appendChild(name);item.appendChild(rmBtn);
      listEl.appendChild(item);
    });
    // Update drop area style
    dropArea.style.borderColor=fileArr.length>0?'#10B981':'#CBD5E1';
    dropArea.style.background=fileArr.length>0?'#ECFDF5':'#F8FAFC';
  }

  fi.addEventListener('change',function(e){
    var picked=Array.from(e.target.files);
    picked.forEach(function(f){
      try{f.__tipo=tipo;}catch(ex){}
      fileArr.push(f);
    });
    fi.value='';
    refresh();
    if(onUpdate)onUpdate();
  });

  zone.refresh=refresh;
  zone.getFiles=function(){return fileArr;};
  return zone;
}

async function uploadFiles(files,reqId){
  const uploaded=[];
  for(var i=0;i<files.length;i++){
    var f=files[i];
    var tipo=f._tipo||f.__tipo||'nf';
    var ext=(f.name&&f.name.includes('.')?f.name.split('.').pop():'bin').toLowerCase();
    var safeName=genId()+'.'+ext;
    var path=reqId+'/'+tipo+'_'+safeName;
    var res=await sb.storage.from(BUCKET).upload(path,f,{upsert:true});
    if(res.error){
      console.error('Upload error:',res.error);
      throw new Error('Falha ao enviar "'+f.name+'": '+res.error.message);
    }
    var urlRes=sb.storage.from(BUCKET).getPublicUrl(path);
    uploaded.push({name:f.name,path:path,url:urlRes.data.publicUrl,tipo:tipo});
  }
  return uploaded;
}

// ── NEW REQUEST ────────────────────────────────────────────────────────────────
function openNewRequest(editReq=null){
  let nfFiles=[],xmlFiles=[];
  let xmlData=null;
  const isEdit=!!editReq;

  const overlay=el('div',{'class':'modal-overlay'});
  const modal=el('div',{'class':'modal'});
  const hdr=el('div',{'class':'modal-header'},
    el('h3',{style:'margin:0;font-size:18px;font-weight:700;color:#0F172A'},isEdit?'Editar Solicitação':'Nova Solicitação'),
    el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:()=>overlay.remove()},'×')
  );
  const body=el('div',{'class':'modal-body'});

  const nfWrap=el('div',{'class':'input-wrap'});nfWrap.append(el('label',{},'Número da Nota Fiscal *'));
  const nfInput=el('input',{type:'text',placeholder:'Ex: 001234',value:editReq?.nf||''});nfWrap.append(nfInput);
  const dateWrap=el('div',{'class':'input-wrap'});dateWrap.append(el('label',{},'Data preferencial'));
  const dateInput=el('input',{type:'date',value:editReq?.pre_date||''});dateWrap.append(dateInput);
  const obsWrap=el('div',{'class':'input-wrap'});obsWrap.append(el('label',{},'Observações'));

  // XML preview box
  const xmlPreview=el('div',{style:'display:none'});
  const showXmlPreview=(data)=>{
    if(!data||!data.valid){xmlPreview.style.display='none';return;}
    xmlData=data;
    xmlPreview.style.display='block';
    xmlPreview.replaceChildren(
      el('div',{'class':'xml-info'},
        el('div',{style:'font-size:13px;font-weight:700;color:#1E40AF;margin-bottom:4px'},'✅ XML lido com sucesso!'),
        el('div',{style:'font-size:12px;color:#64748B'},data.emitente||(data.cnpjEmit?'CNPJ: '+data.cnpjEmit:'')),
        el('div',{'class':'xml-info-grid'},
          el('div',{'class':'xml-info-item'},el('div',{'class':'val'},String(data.volumes||0)),el('div',{'class':'lbl'},'Volumes')),
          el('div',{'class':'xml-info-item'},el('div',{'class':'val'},String(data.itens||0)),el('div',{'class':'lbl'},'Itens')),
          el('div',{'class':'xml-info-item'},el('div',{'class':'val'},data.peso?data.peso.toFixed(1)+'kg':'—'),el('div',{'class':'lbl'},'Peso Bruto')),
          el('div',{'class':'xml-info-item'},el('div',{'class':'val'},currency(data.valor)),el('div',{'class':'lbl'},'Valor Total'))
        )
      )
    );
    if(data.numero&&!nfInput.value)nfInput.value=data.numero;
  };

  const filesBox=el('div',{style:'background:#F8FAFC;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #E2E8F0'});
  filesBox.append(el('div',{style:'font-size:13px;font-weight:700;color:#0F172A;margin-bottom:4px'},'📎 Anexar Documentos'));
  if(isEdit)filesBox.append(el('div',{style:'font-size:12px;color:#64748B;margin-bottom:12px'},'Novos arquivos serão adicionados aos já existentes.'));
  else filesBox.append(el('div',{style:'font-size:12px;color:#64748B;margin-bottom:12px'},''));

  const nfZone=makeFileZone('🧾 Nota Fiscal (PDF, imagem)','nf','.pdf,.jpg,.jpeg,.png,.xml',nfFiles,()=>{});
  const xmlZone=makeFileZone('📄 Arquivo XML','xml','.xml,.txt',xmlFiles,async()=>{
    if(xmlFiles.length>0){
      const last=xmlFiles[xmlFiles.length-1];
      const txt=await readFileAsText(last);
      showXmlPreview(parseNFeXML(txt));
    }else{xmlPreview.style.display='none';xmlData=null;}
  });
  filesBox.append(nfZone,xmlPreview,xmlZone);

  const progress=el('div',{style:'display:none;background:#EFF6FF;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#2563EB;font-weight:600'});
  const btns=el('div',{style:'display:flex;gap:10px'});

    const nf=nfInput.value.trim();
    if(!nf){alert('Informe o número da Nota Fiscal.');return;}
    if(!isEdit&&nfFiles.length===0){alert('Anexe pelo menos um arquivo de Nota Fiscal (PDF, imagem).');return;}

      xmlFiles.forEach(f=>{ try{Object.defineProperty(f,'_tipo',{value:'xml',writable:true,configurable:true});}catch(e){} });
      const allFiles=[...nfFiles,...xmlFiles];
      progress.textContent='⏳ Enviando arquivos...';
      const uploaded=await uploadFiles(allFiles,reqId);
      const existingFiles=isEdit?(editReq.files||[]):[];

        await sb.from('requests').update({nf,obs:obsInput.value,pre_date:dateInput.value,files:allUploaded,xml_data:xmlData||editReq.xml_data,history:newHist,updated_at:new Date().toISOString()}).eq('id',reqId);

      overlay.remove();loadData();
    }catch(e){alert('Erro: '+e.message);submitBtn.disabled=false;submitBtn.textContent=isEdit?'Salvar':'Enviar Solicitação';progress.style.display='none';}
  }},isEdit?'Salvar alterações':'Enviar Solicitação');
  btns.append(cancelBtn,submitBtn);
  body.append(nfWrap,dateWrap,obsWrap,filesBox,progress,btns);
  modal.append(hdr,body);overlay.append(modal);document.body.append(overlay);
}

  // Header with action buttons
  const hdrRight=el('div',{style:'display:flex;align-items:center;gap:8px'});

  if(!isAdmin&&!['Cancelado','Entregue'].includes(req.status)){

  }
  if(isAdmin){
    hdrRight.append(el('button',{'class':'btn btn-danger',style:'padding:6px 12px;font-size:12px',onclick:()=>deleteRequest(req,overlay)},'🗑️ Excluir'));
  }
  hdrRight.append(el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:()=>overlay.remove()},'×'));

  const hdr=el('div',{'class':'modal-header'},el('h3',{style:'margin:0;font-size:16px;font-weight:700;color:#0F172A'},`NF ${req.nf}`),hdrRight);
  const body=el('div',{'class':'modal-body'});

  // Tabs
  const tabBar=el('div',{'class':'tab-bar'});
  const tabBtns=[];
  const panels=[];
  const mkTab=(label,content)=>{
    const btn=el('button',{'class':'tab-btn'},label);
    const panel=el('div',{style:'display:none'},content);
    tabBtns.push(btn);panels.push(panel);
    btn.addEventListener('click',()=>{tabBtns.forEach((b,i)=>{b.classList.toggle('active',i===tabBtns.indexOf(btn));panels[i].style.display=i===tabBtns.indexOf(btn)?'block':'none';});});
    tabBar.append(btn);return panel;
  };

  // Tab 1: Info
  const infoPanel=el('div',{});
  const infoBox=el('div',{'class':'info-box'});
  const row=(l,v)=>{const d=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:6px'});d.append(el('span',{style:'font-size:13px;color:#64748B;font-weight:600;flex-shrink:0'},l),el('span',{style:'font-size:13px;color:#0F172A;text-align:right;word-break:break-all'},v));return d;};
  infoBox.append(row('Empresa',`${req.user_name} (${req.user_type})`),row('E-mail',req.user_email),row('NF',req.nf));
  if(req.pre_date)infoBox.append(row('Data preferencial',fmtDate(req.pre_date)));
  if(req.sched_date){
    const days=daysRemaining(req.sched_date);
    const daysTxt=days<0?` (${Math.abs(days)}d de atraso)`:days===0?' (Hoje)':` (em ${days}d)`;
    infoBox.append(row('Data agendada',fmtDate(req.sched_date)+daysTxt));
  }
  infoBox.append(row('Aberto em',fmt(req.created_at)));
  if(req.obs)infoBox.append(row('Obs.',req.obs));
  const sRow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-top:8px'});sRow.append(el('span',{style:'font-size:13px;color:#64748B;font-weight:600'},'Status'),badge);infoBox.append(sRow);
  infoPanel.append(infoBox);

  // XML Data
  if(req.xml_data?.valid){
    const xb=el('div',{'class':'xml-info'});
    xb.append(el('div',{style:'font-size:13px;font-weight:700;color:#1E40AF;margin-bottom:4px'},'📦 Dados da NF-e (lidos do XML)'));
    if(req.xml_data.emitente)xb.append(el('div',{style:'font-size:12px;color:#64748B;margin-bottom:8px'},req.xml_data.emitente));
    const grid=el('div',{'class':'xml-info-grid'});
    grid.append(
      ...[['Volumes',String(req.xml_data.volumes||0)],['Itens',String(req.xml_data.itens||0)],['Peso Bruto',req.xml_data.peso?(req.xml_data.peso.toFixed(1)+'kg'):'—'],['Valor Total',currency(req.xml_data.valor)]].map(([l,v])=>el('div',{'class':'xml-info-item'},el('div',{'class':'val'},v),el('div',{'class':'lbl'},l)))
    );
    xb.append(grid);infoPanel.append(xb);
  }
  mkTab('ℹ️ Informações',infoPanel);

  // Tab 2: Files
  const filesPanel=el('div',{});
  const nfFiles=(req.files||[]).filter(f=>f.tipo==='nf');
  const xmlFiles=(req.files||[]).filter(f=>f.tipo==='xml');

  const mkFileSection=(files,label)=>{
    if(!files.length)return null;
    const s=el('div',{style:'margin-bottom:16px'});
    s.append(el('div',{style:'font-size:13px;font-weight:700;color:#475569;margin-bottom:6px'},`${label} (${files.length})`));
    for(const f of files){
      const item=el('div',{'class':'file-item'});
      item.append(el('span',{style:'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1'},`${label.includes('NF')?'🧾':'📄'} ${f.name}`));
      if(f.url)item.append(el('a',{href:f.url,target:'_blank',style:'background:#2563EB;color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;text-decoration:none;flex-shrink:0'},'⬇ Baixar'));
      s.append(item);
    }
    // Download all button
    if(files.length>1){
      s.append(el('button',{'class':'btn btn-secondary',style:'width:100%;margin-top:8px;font-size:12px',onclick:()=>{
        files.forEach((f,i)=>{
          if(f.url){
            setTimeout(()=>{
              const a=document.createElement('a');
              a.href=f.url;
              a.target='_blank';
              a.download=f.name;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            },i*800);
          }
        });
      }},'⬇ Baixar todos'));
    }
    return s;
  };

  if(!nfFiles.length&&!xmlFiles.length){
    filesPanel.append(el('div',{style:'text-align:center;padding:32px;color:#94A3B8;font-size:14px'},'Nenhum arquivo anexado'));
  }else{
    const s1=mkFileSection(nfFiles,'🧾 Notas Fiscais');
    const s2=mkFileSection(xmlFiles,'📄 Arquivos XML');
    if(s1)filesPanel.append(s1);
    if(s2)filesPanel.append(s2);
    // Download all files
    if(isAdmin&&(req.files||[]).length>1){
      filesPanel.append(el('button',{'class':'btn btn-primary',style:'width:100%;margin-top:8px',onclick:()=>{
        (req.files||[]).forEach((f,i)=>{
          if(f.url){
            setTimeout(()=>{
              const a=document.createElement('a');
              a.href=f.url;
              a.target='_blank';
              a.download=f.name;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            },i*800);
          }
        });
      }},'⬇ Baixar todos os arquivos'));
    }
  }
  mkTab('📎 Anexos',filesPanel);

  // Tab 3: History
  const histPanel=el('div',{});
  const hist=[...(req.history||[])].reverse();
  if(!hist.length){histPanel.append(el('div',{style:'text-align:center;padding:32px;color:#94A3B8'},'Sem histórico'));}
  for(const h of hist){
    const hcfg=STATUS[h.status]||{color:'#94A3B8',bg:'#F3F4F6',icon:'•'};
    const hbadge=el('span',{'class':'badge',style:`background:${hcfg.bg};color:${hcfg.color};border:1px solid ${hcfg.color}30`},`${hcfg.icon} ${h.status}`);
    const hrow=el('div',{style:'display:flex;gap:10px;align-items:flex-start;margin-bottom:12px'});
    const dot=el('div',{style:`width:8px;height:8px;border-radius:50%;background:${hcfg.color};margin-top:5px;flex-shrink:0`});
    const hinfo=el('div',{style:'flex:1'});
    const htop=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'});htop.append(hbadge,el('span',{style:'font-size:11px;color:#94A3B8'},fmt(h.date)));
    hinfo.append(htop);
    if(h.note)hinfo.append(el('div',{style:'font-size:12px;color:#64748B;margin-top:3px'},h.note));
    hrow.append(dot,hinfo);histPanel.append(hrow);
  }
  mkTab('📋 Histórico',histPanel);

  // Tab 4: Admin update
  if(isAdmin){
    const adminPanel=el('div',{});
    const selWrap=el('div',{'class':'input-wrap'});selWrap.append(el('label',{},'Novo status'));
    const sel=el('select',{style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;background:#FAFAFA'});
    for(const s of Object.keys(STATUS))sel.append(el('option',{value:s,selected:s===req.status?'true':undefined},s));
    selWrap.append(sel);adminPanel.append(selWrap);
    const dateWrap2=el('div',{'class':'input-wrap',style:'display:none'});dateWrap2.append(el('label',{},'Data do agendamento'));
    const dateInp2=el('input',{type:'date',value:req.sched_date||''});dateWrap2.append(dateInp2);adminPanel.append(dateWrap2);
    sel.addEventListener('change',()=>{dateWrap2.style.display=['Agendado','Reagendamento Solicitado'].includes(sel.value)?'block':'none';});
    const noteWrap=el('div',{'class':'input-wrap'});noteWrap.append(el('label',{},'Observação'));
    const noteInp=el('textarea',{rows:'2',placeholder:'Ex: Agendado para recebimento no dock 3...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit'});noteWrap.append(noteInp);adminPanel.append(noteWrap);
    const saveBtn=el('button',{'class':'btn btn-primary',style:'width:100%',onclick:async()=>{
      saveBtn.disabled=true;saveBtn.textContent='Salvando...';
      const ns=sel.value;
      const newHist=[...(req.history||[]),{status:ns,note:noteInp.value||`Status atualizado para "${ns}".`,date:new Date().toISOString()}];
      const{data,error}=await sb.from('requests').update({status:ns,sched_date:dateInp2.value||req.sched_date||null,history:newHist,updated_at:new Date().toISOString()}).eq('id',req.id).select().single();
      if(!error){
        await sb.from('notifications').insert({id:genId(),to_user:req.user_id,req_id:req.id,msg:`Sua solicitação NF ${req.nf} foi atualizada: ${ns}`,read:false});

        overlay.remove();loadData();
      }else{alert('Erro: '+error.message);saveBtn.disabled=false;saveBtn.textContent='Salvar atualização';}
    }},'Salvar atualização');
    adminPanel.append(saveBtn);
    mkTab('⚙️ Atualizar',adminPanel);
  }

  // Activate first tab
  tabBtns[0].classList.add('active');panels[0].style.display='block';

  body.append(tabBar,...panels);
  if(!isAdmin)body.append(el('button',{'class':'btn btn-secondary',style:'width:100%;margin-top:8px',onclick:()=>overlay.remove()},'Fechar'));
  modal.append(hdr,body);overlay.append(modal);document.body.append(overlay);
}

// ── RESCHEDULE ─────────────────────────────────────────────────────────────────
function openReschedule(req,parentOverlay){
  const overlay=el('div',{'class':'modal-overlay',style:'z-index:1100'});
  const modal=el('div',{'class':'modal',style:'max-width:400px'});
  const hdr=el('div',{'class':'modal-header'},el('h3',{style:'margin:0;font-size:18px;font-weight:700;color:#0F172A'},'🔄 Solicitar Reagendamento'),el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:()=>overlay.remove()},'×'));
  const body=el('div',{'class':'modal-body'});
  body.append(el('p',{style:'color:#64748B;font-size:14px;margin-bottom:16px'},`Solicitação NF ${req.nf} está agendada para ${fmtDate(req.sched_date)}. Informe o motivo do reagendamento:`));
  const motivo=el('textarea',{rows:'3',placeholder:'Ex: Veículo indisponível na data agendada...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit;margin-bottom:16px'});
  const newDateWrap=el('div',{'class':'input-wrap'});newDateWrap.append(el('label',{},'Nova data sugerida'));
  const newDate=el('input',{type:'date'});newDateWrap.append(newDate);
  const btns=el('div',{style:'display:flex;gap:10px'});
  const sendBtn=el('button',{'class':'btn btn-warning',style:'flex:2',onclick:async()=>{
    if(!motivo.value.trim()){alert('Informe o motivo do reagendamento.');return;}
    sendBtn.disabled=true;sendBtn.textContent='Enviando...';
    const note=`Reagendamento solicitado. Motivo: ${motivo.value}${newDate.value?' | Nova data sugerida: '+fmtDate(newDate.value):''}`;
    const newHist=[...(req.history||[]),{status:'Reagendamento Solicitado',note,date:new Date().toISOString()}];
    const{error}=await sb.from('requests').update({status:'Reagendamento Solicitado',history:newHist,updated_at:new Date().toISOString()}).eq('id',req.id);
    if(!error){
      await sb.from('notifications').insert({id:genId(),to_user:'admin',req_id:req.id,msg:`⚠️ Reagendamento solicitado por ${APP_STATE.user.name} — NF ${req.nf}`,read:false});
      overlay.remove();parentOverlay.remove();loadData();
    }else{alert('Erro: '+error.message);sendBtn.disabled=false;sendBtn.textContent='Enviar Solicitação';}
  }},'Enviar Solicitação');
  btns.append(el('button',{'class':'btn btn-secondary',style:'flex:1',onclick:()=>overlay.remove()},'Cancelar'),sendBtn);
  body.append(motivo,newDateWrap,btns);modal.append(hdr,body);overlay.append(modal);document.body.append(overlay);
}

// ── DELETE ────────────────────────────────────────────────────────────────────
async function deleteRequest(req,overlay){
  if(!confirm(`Tem certeza que deseja excluir a solicitação NF ${req.nf}? Esta ação não pode ser desfeita.`))return;
  const{error}=await sb.from('requests').delete().eq('id',req.id);
  if(!error){overlay.remove();loadData();}
  else alert('Erro ao excluir: '+error.message);
}

render();
</script>
</body>
</html>
