function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(iso){return iso?new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):""; }
function fmtDate(iso){return iso?new Date(iso+"T00:00:00").toLocaleDateString("pt-BR"):""; }

function daysRemaining(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);var g=new Date(d+"T00:00:00");return Math.round((g-t)/86400000);}

function el(tag,attrs){
  var e=document.createElement(tag);
  var kids=Array.prototype.slice.call(arguments,2);
  for(var k in attrs||{}){
    if(k==='class')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  kids.forEach(function(k){if(k!=null)e.appendChild(typeof k==='string'?document.createTextNode(k):k);});
  return e;
}

function parseNFeXML(txt){
  try{
    var doc=new DOMParser().parseFromString(txt,"text/xml");
    function get(t){var n=doc.getElementsByTagName(t)[0];return n?n.textContent:null;}
    var vols=doc.getElementsByTagName('vol'),tv=0,tp=0;
    for(var i=0;i<vols.length;i++){var q=vols[i].getElementsByTagName('qVol')[0],p=vols[i].getElementsByTagName('pesoB')[0];if(q)tv+=parseInt(q.textContent)||0;if(p)tp+=parseFloat(p.textContent)||0;}
    var dets=doc.getElementsByTagName('det');
    return{numero:get('nNF'),emitente:get('xNome'),cnpjEmit:get('CNPJ'),valor:get('vNF'),volumes:tv||dets.length,peso:tp,itens:dets.length,valid:true};
  }catch(e){return{valid:false};}
}

function readText(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.onerror=rej;r.readAsText(file);});}

// ── UPLOAD ──────────────────────────────────────────────────────────────────
async function uploadFiles(files,reqId){
  var out=[];
  for(var i=0;i<files.length;i++){
    var f=files[i],tipo=f.__tipo||'nf';
    var ext=f.name.includes('.')?f.name.split('.').pop().toLowerCase():'bin';
    var path=reqId+'/'+tipo+'_'+genId()+'.'+ext;
    var r=await sb.storage.from(BUCKET).upload(path,f,{upsert:true});
    if(r.error)throw new Error('Falha: '+f.name+' — '+r.error.message);
    var u=sb.storage.from(BUCKET).getPublicUrl(path);
    out.push({name:f.name,path:path,url:u.data.publicUrl,tipo:tipo});
  }
  return out;
}

// ── FILE ZONE ────────────────────────────────────────────────────────────────
function makeFileZone(label,tipo,accept,arr,cb){
  var wrap=document.createElement('div');
  wrap.style.marginBottom='14px';
  var lbl=document.createElement('div');
  lbl.style.cssText='font-size:13px;font-weight:600;color:#475569;margin-bottom:6px';
  lbl.textContent=label;
  var btn=document.createElement('button');
  btn.type='button';
  btn.className='pick-btn';
  btn.textContent=(tipo==='nf'?'🧾':'📄')+' Clique para selecionar '+(tipo==='nf'?'Nota Fiscal':'XML');
  var inp=document.createElement('input');
  inp.type='file';inp.multiple=true;inp.accept=accept;inp.style.display='none';
  document.body.appendChild(inp);
  btn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();inp.click();});
  var list=document.createElement('div');list.style.marginTop='8px';
  function refresh(){
    list.innerHTML='';
    btn.style.borderColor=arr.length?'#10B981':'#CBD5E1';
    btn.style.background=arr.length?'#ECFDF5':'#F8FAFC';
    btn.style.color=arr.length?'#065F46':'#64748B';
    arr.forEach(function(f,i){
      var row=el('div',{'class':'file-item'});
      var nm=document.createElement('span');nm.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=(tipo==='nf'?'🧾':'📄')+' '+f.name;
      var rm=document.createElement('button');rm.type='button';rm.style.cssText='background:none;border:none;color:#EF4444;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0';rm.textContent='×';
      rm.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();arr.splice(i,1);refresh();if(cb)cb();});
      row.appendChild(nm);row.appendChild(rm);list.appendChild(row);
    });
  }
  inp.addEventListener('change',function(){
    Array.from(inp.files).forEach(function(f){f.__tipo=tipo;arr.push(f);});
    inp.value='';refresh();if(cb)cb();
  });
  wrap.appendChild(lbl);wrap.appendChild(btn);wrap.appendChild(list);
  wrap.cleanup=function(){if(inp.parentNode)inp.parentNode.removeChild(inp);};
  wrap.refresh=refresh;
  return wrap;
}

// ── CALENDAR VIEW (ADMIN) ─────────────────────────────────────────────────────
async function renderCalendar(){
  var r=await sb.from('blocked_dates').select('*').order('date');
  var blocked=r.data||[];
  var today=new Date();
  var curYear=today.getFullYear(),curMonth=today.getMonth();
  function buildCalView(year,month){
    dashMain.innerHTML='';
    var wrap=el('div',{});
    var hdr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:20px'});
    hdr.appendChild(el('h2',{style:'font-size:18px;font-weight:700;color:#0F172A'},'📅 Datas Bloqueadas'));
    wrap.appendChild(hdr);
    // Calendar nav
    var cal=el('div',{style:'background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px'});
    var nav=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'});
    var months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    nav.appendChild(el('button',{type:'button','class':'btn btn-secondary',style:'padding:6px 12px',onclick:function(){if(month===0){month=11;year--;}else month--;buildCalView(year,month);}},'◀'));
    nav.appendChild(el('span',{style:'font-weight:700;font-size:16px;color:#0F172A'},months[month]+' '+year));
    nav.appendChild(el('button',{type:'button','class':'btn btn-secondary',style:'padding:6px 12px',onclick:function(){if(month===11){month=0;year++;}else month++;buildCalView(year,month);}},'▶'));
    cal.appendChild(nav);
    var grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center'});
    ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(function(d){grid.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:#94A3B8;padding:4px'},d));});
    var firstDay=new Date(year,month,1).getDay();
    var daysInMonth=new Date(year,month+1,0).getDate();
    for(var i=0;i<firstDay;i++)grid.appendChild(el('div',{}));
    var blockedDates=blocked.map(function(b){return b.date;});
    for(var d=1;d<=daysInMonth;d++){
      var dateStr=year+'-'+(String(month+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
      var isPast=new Date(dateStr+'T00:00:00')<today&&dateStr!==today.toISOString().slice(0,10);
      var isToday=dateStr===today.toISOString().slice(0,10);
      var isBlocked=blockedDates.includes(dateStr);
      var dayEl=document.createElement('div');
      dayEl.className='cal-day'+(isBlocked?' blocked':isToday?' today':isPast?' past':'');
      dayEl.textContent=String(d);
      if(!isPast){
        (function(ds,isB){
          dayEl.addEventListener('click',async function(){
            if(isB){
              if(!confirm('Desbloquear '+fmtDate(ds)+'?'))return;
              await sb.from('blocked_dates').delete().eq('date',ds);
            }else{
              var reason=prompt('Motivo do bloqueio para '+fmtDate(ds)+' (opcional):');
              if(reason===null)return;
              await sb.from('blocked_dates').insert({id:genId(),date:ds,reason:reason||'Indisponível'});
            }
            var r2=await sb.from('blocked_dates').select('*').order('date');
            blocked=r2.data||[];
            APP.blockedDates=blocked.map(function(b){return b.date;});
            buildCalView(year,month);
          });
        })(dateStr,isBlocked);
      }
      grid.appendChild(dayEl);
    }
    cal.appendChild(grid);
    cal.appendChild(el('div',{style:'display:flex;gap:12px;margin-top:16px;font-size:12px;color:#64748B'},
      el('span',{style:'display:flex;align-items:center;gap:4px'},el('span',{style:'width:14px;height:14px;background:#FEF2F2;border:1.5px solid #EF4444;border-radius:3px;display:inline-block'}),' Bloqueado'),
      el('span',{style:'display:flex;align-items:center;gap:4px'},el('span',{style:'width:14px;height:14px;background:#fff;border:1.5px solid #2563EB;border-radius:3px;display:inline-block'}),' Hoje'),
      el('span',{},'Clique para bloquear/desbloquear')
    ));
    wrap.appendChild(cal);
    // List of blocked dates
    if(blocked.length){
      var listBox=el('div',{style:'background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)'});
      listBox.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#0F172A;margin-bottom:12px'},'Datas bloqueadas ('+blocked.length+')'));
      blocked.forEach(function(b){
        var row=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1F5F9'});
        var info=el('div',{});
        info.appendChild(el('div',{style:'font-weight:600;font-size:14px;color:#EF4444'},'❌ '+fmtDate(b.date)));
        if(b.reason)info.appendChild(el('div',{style:'font-size:12px;color:#64748B'},b.reason));
        var rm=el('button',{'class':'btn btn-danger',style:'padding:5px 10px;font-size:12px',onclick:async function(){
          await sb.from('blocked_dates').delete().eq('id',b.id);
          var r2=await sb.from('blocked_dates').select('*').order('date');
          blocked=r2.data||[];APP.blockedDates=blocked.map(function(x){return x.date;});
          buildCalView(year,month);
        }},'Remover');
        row.appendChild(info);row.appendChild(rm);listBox.appendChild(row);
      });
      wrap.appendChild(listBox);
    }
    dashMain.appendChild(wrap);
  }
  buildCalView(curYear,curMonth);
}

    el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:closeAll},'×')
  ));
  var body=el('div',{'class':'modal-body'});
  var nfW=el('div',{'class':'input-wrap'});nfW.appendChild(el('label',{},'Número da Nota Fiscal *'));
  var nfI=el('input',{type:'text',placeholder:'Ex: 001234',value:isEdit?editReq.nf:''});nfW.appendChild(nfI);
  var dtW=el('div',{'class':'input-wrap'});dtW.appendChild(el('label',{},'Data preferencial'));
  var dtI=el('input',{type:'date',value:isEdit?editReq.pre_date||'':''});
  // Block blocked dates
  dtI.addEventListener('change',function(){
    if(APP.blockedDates.includes(dtI.value)){
      alert('⚠️ A data '+fmtDate(dtI.value)+' está bloqueada para agendamentos. Escolha outra data.');
      dtI.value='';
    }
  });
  dtW.appendChild(dtI);
  var obsW=el('div',{'class':'input-wrap'});obsW.appendChild(el('label',{},'Observações'));
  var obsI=el('textarea',{rows:'2',placeholder:'Informe detalhes...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit'});
  obsI.value=isEdit?editReq.obs||'':'';obsW.appendChild(obsI);
  // XML preview
  var xPrev=el('div',{style:'display:none'});
  function showXML(data){
    if(!data||!data.valid){xPrev.style.display='none';xmlData=null;return;}
    xmlData=data;xPrev.style.display='block';
    xPrev.innerHTML='';
    var xb=el('div',{'class':'xml-info'});
    xb.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:#1E40AF;margin-bottom:4px'},'✅ XML lido com sucesso!'));
    if(data.emitente)xb.appendChild(el('div',{style:'font-size:12px;color:#64748B'},data.emitente));
    var grid=el('div',{'class':'xml-info-grid'});
    [['Volumes',String(data.volumes||0)],['Itens',String(data.itens||0)],['Peso',data.peso?data.peso.toFixed(1)+'kg':'—'],['Valor',currency(data.valor)]].forEach(function(x){
      var item=el('div',{'class':'xml-info-item'});item.appendChild(el('div',{'class':'val'},x[1]));item.appendChild(el('div',{'class':'lbl'},x[0]));grid.appendChild(item);
    });
    xb.appendChild(grid);xPrev.appendChild(xb);
    if(data.numero&&!nfI.value)nfI.value=data.numero;
  }
  var fBox=el('div',{style:'background:#F8FAFC;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #E2E8F0'});
  fBox.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:#0F172A;margin-bottom:4px'},'📎 Anexar Documentos'));
  if(isEdit)fBox.appendChild(el('div',{style:'font-size:12px;color:#64748B;margin-bottom:10px'},'Novos arquivos serão adicionados aos já existentes.'));
  var nfZ=makeFileZone('🧾 Nota Fiscal (PDF, imagem)','nf','.pdf,.jpg,.jpeg,.png',nfFiles,null);
  var xmlZ=makeFileZone('📄 Arquivo XML','xml','.xml,.txt',xmlFiles,async function(){
    if(xmlFiles.length){var t=await readText(xmlFiles[xmlFiles.length-1]);showXML(parseNFeXML(t));}
    else{xPrev.style.display='none';xmlData=null;}
  });
  fBox.appendChild(nfZ);fBox.appendChild(xPrev);fBox.appendChild(xmlZ);
  var prog=el('div',{style:'display:none;background:#EFF6FF;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#2563EB;font-weight:600'});
  var btns=el('div',{style:'display:flex;gap:10px'});
  var subBtn=el('button',{'class':'btn btn-primary',style:'flex:2',onclick:async function(){
    var nf=nfI.value.trim();
    if(!nf){alert('Informe o número da Nota Fiscal.');return;}
    if(!isEdit&&nfFiles.length===0){alert('Anexe pelo menos um arquivo de Nota Fiscal.');return;}
    subBtn.disabled=true;subBtn.textContent='Enviando...';prog.style.display='block';
    try{
      var reqId=isEdit?editReq.id:genId();
      nfFiles.forEach(function(f){f.__tipo='nf';});
      xmlFiles.forEach(function(f){f.__tipo='xml';});
      var allFiles=nfFiles.concat(xmlFiles);
      prog.textContent='⏳ Enviando arquivos ('+allFiles.length+')...';
      var uploaded=await uploadFiles(allFiles,reqId);
      var existFiles=isEdit?(editReq.files||[]):[];
      var allUploaded=existFiles.concat(uploaded);
      if(isEdit){
        var nh=(editReq.history||[]).concat([{status:editReq.status,note:'Solicitação editada. '+uploaded.length+' arquivo(s) adicionado(s).',date:new Date().toISOString()}]);
        var ur=await sb.from('requests').update({nf:nf,obs:obsI.value,pre_date:dtI.value,files:allUploaded,xml_data:xmlData||editReq.xml_data||null,history:nh,updated_at:new Date().toISOString()}).eq('id',reqId);
        if(ur.error)throw ur.error;
        await sb.from('notifications').insert({id:genId(),to_user:'admin',req_id:reqId,msg:'Solicitação NF '+nf+' editada por '+APP.user.name,read:false});
      }else{
        prog.textContent='⏳ Salvando solicitação...';
        var req={id:reqId,user_id:APP.user.id,user_name:APP.user.name,user_type:APP.user.type,user_email:APP.user.email,nf:nf,obs:obsI.value,pre_date:dtI.value,files:allUploaded,xml_data:xmlData||null,status:'Recebido',history:[{status:'Recebido',note:'Solicitação recebida pelo sistema.',date:new Date().toISOString()}]};
        var ir=await sb.from('requests').insert(req);
        if(ir.error)throw ir.error;
        await sb.from('notifications').insert({id:genId(),to_user:'admin',req_id:reqId,msg:'Nova solicitação de '+APP.user.name+' — NF '+nf,read:false});
      }
      if(nfZ.cleanup)nfZ.cleanup();if(xmlZ.cleanup)xmlZ.cleanup();
      ov.remove();loadAll();
    }catch(e){
      alert('Erro: '+(e.message||JSON.stringify(e)));
      subBtn.disabled=false;subBtn.textContent=isEdit?'Salvar alterações':'Enviar Solicitação';prog.style.display='none';
    }
  }},isEdit?'Salvar alterações':'Enviar Solicitação');
  btns.appendChild(el('button',{'class':'btn btn-secondary',style:'flex:1',onclick:closeAll},'Cancelar'));
  btns.appendChild(subBtn);
  [nfW,dtW,obsW,fBox,prog,btns].forEach(function(e){body.appendChild(e);});
  m.appendChild(body);ov.appendChild(m);document.body.appendChild(ov);
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(req){
  var isAdmin=APP.user.type==='admin';
  var ov=el('div',{'class':'modal-overlay'});
  var m=el('div',{'class':'modal'});
  var cfg=STATUS[req.status]||{color:'#6B7280',bg:'#F3F4F6',icon:'•'};
  var badge=el('span',{'class':'badge',style:'background:'+cfg.bg+';color:'+cfg.color+';border:1px solid '+cfg.color+'30'},cfg.icon+' '+req.status);
  var hdrR=el('div',{style:'display:flex;align-items:center;gap:6px'});
  if(!isAdmin&&!['Cancelado','Entregue'].includes(req.status))hdrR.appendChild(el('button',{'class':'btn btn-secondary',style:'padding:6px 10px;font-size:12px',onclick:function(){ov.remove();openNewRequest(req);}},'✏️ Editar'));
  if(!isAdmin&&req.status==='Agendado')hdrR.appendChild(el('button',{'class':'btn btn-warning',style:'padding:6px 10px;font-size:12px',onclick:function(){openReschedule(req,ov);}},'🔄 Reagendar'));
  if(!isAdmin&&['Recebido','Divergência em Ordem de Compras'].includes(req.status))hdrR.appendChild(el('button',{'class':'btn btn-danger',style:'padding:6px 10px;font-size:12px',onclick:function(){deleteReq(req,ov);}},'🗑️'));
  if(isAdmin)hdrR.appendChild(el('button',{'class':'btn btn-danger',style:'padding:6px 10px;font-size:12px',onclick:function(){deleteReq(req,ov);}},'🗑️'));
  hdrR.appendChild(el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:function(){ov.remove();}},'×'));
  m.appendChild(el('div',{'class':'modal-header'},el('h3',{style:'margin:0;font-size:16px;font-weight:700;color:#0F172A'},'NF '+req.nf),hdrR));
  var body=el('div',{'class':'modal-body'});
  // Tabs
  var tabBar=el('div',{'class':'tab-bar'});
  var tabBtns=[],panels=[];
  function mkTab(lbl,content){
    var b=el('button',{'class':'tab-btn'},lbl);
    var p=el('div',{style:'display:none'});p.appendChild(content);
    tabBtns.push(b);panels.push(p);
    b.addEventListener('click',function(){tabBtns.forEach(function(x,i){x.classList.toggle('active',x===b);panels[i].style.display=x===b?'block':'none';});});
    tabBar.appendChild(b);return p;
  }
  // Info panel
  var infoPanel=el('div',{});
  var ib=el('div',{'class':'info-box'});
  function row(l,v){var d=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:6px'});d.appendChild(el('span',{style:'font-size:13px;color:#64748B;font-weight:600;flex-shrink:0'},l));d.appendChild(el('span',{style:'font-size:13px;color:#0F172A;text-align:right;word-break:break-all'},v));return d;}
  ib.appendChild(row('Empresa',req.user_name+' ('+req.user_type+')'));
  ib.appendChild(row('E-mail',req.user_email));
  ib.appendChild(row('NF',req.nf));
  if(req.pre_date)ib.appendChild(row('Data preferencial',fmtDate(req.pre_date)));
  if(req.sched_date){var days=daysRemaining(req.sched_date);ib.appendChild(row('Data agendada',fmtDate(req.sched_date)+(days<0?' ('+Math.abs(days)+'d atraso)':days===0?' (Hoje)':' (em '+days+'d)')));}
  ib.appendChild(row('Aberto em',fmt(req.created_at)));
  if(req.obs)ib.appendChild(row('Obs.',req.obs));
  var sr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-top:8px'});sr.appendChild(el('span',{style:'font-size:13px;color:#64748B;font-weight:600'},'Status'));sr.appendChild(badge);ib.appendChild(sr);
  infoPanel.appendChild(ib);
  if(req.xml_data&&req.xml_data.valid){
    var xb=el('div',{'class':'xml-info'});
    xb.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:#1E40AF;margin-bottom:4px'},'📦 Dados da NF-e (XML)'));
    if(req.xml_data.emitente)xb.appendChild(el('div',{style:'font-size:12px;color:#64748B;margin-bottom:8px'},req.xml_data.emitente));
    var grid2=el('div',{'class':'xml-info-grid'});
    [['Volumes',String(req.xml_data.volumes||0)],['Itens',String(req.xml_data.itens||0)],['Peso',req.xml_data.peso?req.xml_data.peso.toFixed(1)+'kg':'—'],['Valor',currency(req.xml_data.valor)]].forEach(function(x){var item=el('div',{'class':'xml-info-item'});item.appendChild(el('div',{'class':'val'},x[1]));item.appendChild(el('div',{'class':'lbl'},x[0]));grid2.appendChild(item);});
    xb.appendChild(grid2);infoPanel.appendChild(xb);
  }
  mkTab('ℹ️ Info',infoPanel);
  // Files panel
  var filesPanel=el('div',{});
  var nfFiles=(req.files||[]).filter(function(f){return f.tipo==='nf';});
  var xmlFiles=(req.files||[]).filter(function(f){return f.tipo==='xml';});
  function mkFileSection(files,label){
    if(!files.length)return null;
    var s=el('div',{style:'margin-bottom:16px'});
    s.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:#475569;margin-bottom:6px'},label+' ('+files.length+')'));
    files.forEach(function(f){
      var item=el('div',{'class':'file-item'});
      var nm=document.createElement('span');nm.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=(label.includes('NF')?'🧾':'📄')+' '+f.name;
      item.appendChild(nm);
      if(f.url){var a=el('a',{href:f.url,target:'_blank',style:'background:#2563EB;color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;text-decoration:none;flex-shrink:0'},'⬇ Baixar');item.appendChild(a);}
      s.appendChild(item);
    });
    if(files.length>1){s.appendChild(el('button',{'class':'btn btn-secondary',type:'button',style:'width:100%;margin-top:6px;font-size:12px',onclick:function(){files.forEach(function(f,i){if(f.url)setTimeout(function(){var a=document.createElement('a');a.href=f.url;a.target='_blank';a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);},i*800);});}}, '⬇ Baixar todos'));}
    return s;
  }
  if(!nfFiles.length&&!xmlFiles.length)filesPanel.appendChild(el('div',{style:'text-align:center;padding:32px;color:#94A3B8'},'Nenhum arquivo'));
  var s1=mkFileSection(nfFiles,'🧾 Notas Fiscais');var s2=mkFileSection(xmlFiles,'📄 XMLs');
  if(s1)filesPanel.appendChild(s1);if(s2)filesPanel.appendChild(s2);
  if(isAdmin&&(req.files||[]).length>1)filesPanel.appendChild(el('button',{'class':'btn btn-primary',type:'button',style:'width:100%;margin-top:8px',onclick:function(){(req.files||[]).forEach(function(f,i){if(f.url)setTimeout(function(){var a=document.createElement('a');a.href=f.url;a.target='_blank';a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);},i*800);});}},'⬇ Baixar todos os arquivos'));
  mkTab('📎 Anexos',filesPanel);
  // History panel
  var histPanel=el('div',{});
  var hist=(req.history||[]).slice().reverse();
  if(!hist.length)histPanel.appendChild(el('div',{style:'text-align:center;padding:32px;color:#94A3B8'},'Sem histórico'));
  hist.forEach(function(h){
    var hc=STATUS[h.status]||{color:'#94A3B8',bg:'#F3F4F6',icon:'•'};
    var hb=el('span',{'class':'badge',style:'background:'+hc.bg+';color:'+hc.color+';border:1px solid '+hc.color+'30'},hc.icon+' '+h.status);
    var hr=el('div',{style:'display:flex;gap:10px;align-items:flex-start;margin-bottom:12px'});
    var dot=el('div',{style:'width:8px;height:8px;border-radius:50%;background:'+hc.color+';margin-top:5px;flex-shrink:0'});
    var hi=el('div',{style:'flex:1'});
    var ht=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'});ht.appendChild(hb);ht.appendChild(el('span',{style:'font-size:11px;color:#94A3B8'},fmt(h.date)));hi.appendChild(ht);
    if(h.note)hi.appendChild(el('div',{style:'font-size:12px;color:#64748B;margin-top:3px'},h.note));
    hr.appendChild(dot);hr.appendChild(hi);histPanel.appendChild(hr);
  });
  mkTab('📋 Histórico',histPanel);
  // Admin update panel
  if(isAdmin){
    var adminPanel=el('div',{});
    var selW=el('div',{'class':'input-wrap'});selW.appendChild(el('label',{},'Novo status'));
    var sel=el('select',{style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;background:#FAFAFA'});
    Object.keys(STATUS).forEach(function(s){var o=el('option',{value:s},s);if(s===req.status)o.selected=true;sel.appendChild(o);});
    selW.appendChild(sel);adminPanel.appendChild(selW);
    var sdW=el('div',{'class':'input-wrap',style:'display:none'});sdW.appendChild(el('label',{},'Data do agendamento'));
    var sdI=el('input',{type:'date',value:req.sched_date||''});sdW.appendChild(sdI);adminPanel.appendChild(sdW);
    sel.addEventListener('change',function(){sdW.style.display=['Agendado','Reagendamento Solicitado'].includes(sel.value)?'block':'none';});
    var noteW=el('div',{'class':'input-wrap'});noteW.appendChild(el('label',{},'Observação'));
    var noteI=el('textarea',{rows:'2',placeholder:'Ex: Agendado no dock 3...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit'});noteW.appendChild(noteI);adminPanel.appendChild(noteW);
    var svBtn=el('button',{'class':'btn btn-primary',style:'width:100%',type:'button',onclick:async function(){
      svBtn.disabled=true;svBtn.textContent='Salvando...';
      var ns=sel.value;
      var nh=(req.history||[]).concat([{status:ns,note:noteI.value||'Status atualizado para "'+ns+'".',date:new Date().toISOString()}]);
      var ur=await sb.from('requests').update({status:ns,sched_date:sdI.value||req.sched_date||null,history:nh,updated_at:new Date().toISOString()}).eq('id',req.id);
      if(!ur.error){
        await sb.from('notifications').insert({id:genId(),to_user:req.user_id,req_id:req.id,msg:'Sua solicitação NF '+req.nf+' foi atualizada: '+ns,read:false});
        ov.remove();loadAll();
      }else{alert('Erro: '+ur.error.message);svBtn.disabled=false;svBtn.textContent='Salvar atualização';}
    }},'Salvar atualização');
    adminPanel.appendChild(svBtn);
    mkTab('⚙️ Atualizar',adminPanel);
  }
  tabBtns[0].classList.add('active');panels[0].style.display='block';
  body.appendChild(tabBar);panels.forEach(function(p){body.appendChild(p);});
  if(!isAdmin)body.appendChild(el('button',{'class':'btn btn-secondary',type:'button',style:'width:100%;margin-top:8px',onclick:function(){ov.remove();}},'Fechar'));
  m.appendChild(body);ov.appendChild(m);document.body.appendChild(ov);
}

// ── RESCHEDULE ────────────────────────────────────────────────────────────────
function openReschedule(req,parentOv){
  var ov=el('div',{'class':'modal-overlay',style:'z-index:1100'});
  var m=el('div',{'class':'modal',style:'max-width:420px'});
  m.appendChild(el('div',{'class':'modal-header'},el('h3',{style:'margin:0;font-size:18px;font-weight:700;color:#0F172A'},'🔄 Solicitar Reagendamento'),el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:function(){ov.remove();}},'×')));
  var body=el('div',{'class':'modal-body'});
  body.appendChild(el('p',{style:'color:#64748B;font-size:14px;margin-bottom:16px'},'NF '+req.nf+' agendada para '+fmtDate(req.sched_date)+'. Informe o motivo:'));
  var motivo=el('textarea',{rows:'3',placeholder:'Ex: Veículo indisponível...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit;margin-bottom:16px'});
  var ndW=el('div',{'class':'input-wrap'});ndW.appendChild(el('label',{},'Nova data sugerida'));
  var ndI=el('input',{type:'date'});
  ndI.addEventListener('change',function(){if(APP.blockedDates.includes(ndI.value)){alert('⚠️ Data bloqueada. Escolha outra.');ndI.value='';}});
  ndW.appendChild(ndI);
  var btns=el('div',{style:'display:flex;gap:10px'});
  var send=el('button',{'class':'btn btn-warning',style:'flex:2',type:'button',onclick:async function(){
    if(!motivo.value.trim()){alert('Informe o motivo.');return;}
    send.disabled=true;send.textContent='Enviando...';
    var note='Reagendamento solicitado. Motivo: '+motivo.value+(ndI.value?' | Nova data: '+fmtDate(ndI.value):'');
    var nh=(req.history||[]).concat([{status:'Reagendamento Solicitado',note:note,date:new Date().toISOString()}]);
    var ur=await sb.from('requests').update({status:'Reagendamento Solicitado',history:nh,updated_at:new Date().toISOString()}).eq('id',req.id);
    if(!ur.error){
      await sb.from('notifications').insert({id:genId(),to_user:'admin',req_id:req.id,msg:'⚠️ Reagendamento solicitado por '+APP.user.name+' — NF '+req.nf,read:false});
      ov.remove();parentOv.remove();loadAll();
    }else{alert('Erro: '+ur.error.message);send.disabled=false;send.textContent='Enviar';}
  }},'Enviar');
  btns.appendChild(el('button',{'class':'btn btn-secondary',style:'flex:1',type:'button',onclick:function(){ov.remove();}},'Cancelar'));
  btns.appendChild(send);
  body.appendChild(motivo);body.appendChild(ndW);body.appendChild(btns);
  m.appendChild(body);ov.appendChild(m);document.body.appendChild(ov);
}

// ── DELETE REQUEST ────────────────────────────────────────────────────────────
async function deleteReq(req,ov){
  if(!confirm('Excluir solicitação NF '+req.nf+'? Esta ação não pode ser desfeita.'))return;
  var r=await sb.from('requests').delete().eq('id',req.id);
  if(r.error){alert('Erro: '+r.error.message);return;}
  ov.remove();loadAll();
}

render();
</script>
</body>
</html>
