<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AgendaLog – Agendamento de Entregas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

*{box-sizing:border-box;margin:0;padding:0}

input,select,textarea,button{font-family:inherit}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = "https://ysygfndxnqvlfmkpfifm.supabase.co";
const SUPABASE_KEY = "sb_publishable_9bfnlt737VHJhdMaO33YkA_8PZETE0N";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAIL = "cd.agendamento@produtoskit.com.br";
const ADMIN_PASS  = "admcastro";
const BUCKET = "arquivos";

const STATUS_CONFIG = {
  "Recebido":                        { color:"#3B82F6", bg:"#EFF6FF", icon:"📥" },
  "Em Análise":                      { color:"#F59E0B", bg:"#FFFBEB", icon:"🔍" },
  "Divergência em Ordem de Compras": { color:"#EF4444", bg:"#FEF2F2", icon:"⚠️" },
  "Agendado":                        { color:"#10B981", bg:"#ECFDF5", icon:"✅" },
  "Entregue":                        { color:"#6B7280", bg:"#F9FAFB", icon:"📦" },
};

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "";

// Upload file to Supabase Storage
const uploadFile = async (file, reqId, tipo) => {
  const ext = file.name.split('.').pop();
  const path = `${reqId}/${tipo}_${genId()}.${ext}`;
  const { data, error } = await sb.storage.from(BUCKET).upload(path, file, { upsert: true });
  if (error) throw error;
  const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
  return { name: file.name, path, url: urlData.publicUrl, tipo };
};

function Badge({ status }) {
  const cfg = STATUS_CONFIG[status] || { color:"#6B7280", bg:"#F3F4F6", icon:"•" };
  return <span style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.color}30`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{cfg.icon} {status}</span>;
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 25px 60px rgba(0,0,0,0.2)"}}>
        <div style={{padding:"20px 24px",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#fff",zIndex:10}}>
          <h3 style={{margin:0,fontSize:18,fontWeight:700,color:"#0F172A"}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94A3B8"}}>×</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
}

function Input({ label, ...props }) {
  return (
    <div style={{marginBottom:16}}>
      {label && <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>{label}</label>}
      <input {...props} style={{width:"100%",padding:"10px 14px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:14,outline:"none",background:"#FAFAFA",...props.style}}/>
    </div>
  );
}

function Btn({ children, variant="primary", ...props }) {
  const styles = {
    primary:{background:"#2563EB",color:"#fff",border:"none"},
    secondary:{background:"#F1F5F9",color:"#334155",border:"none"},
    success:{background:"#10B981",color:"#fff",border:"none"},
  };
  return <button {...props} style={{...styles[variant],padding:"10px 20px",borderRadius:10,fontWeight:600,fontSize:14,cursor:"pointer",opacity:props.disabled?0.6:1,...props.style}}>{children}</button>;
}

function FileDropZone({ label, tipo, files, onChange }) {
  const typeIcon = tipo === "nf" ? "🧾" : "📄";
  const typeLabel = tipo === "nf" ? "Nota Fiscal" : "XML";
  return (
    <div style={{marginBottom:16}}>
      <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>{label}</label>
      <label style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,border:`2px dashed ${files.length>0?"#10B981":"#CBD5E1"}`,borderRadius:12,padding:16,cursor:"pointer",background:files.length>0?"#ECFDF5":"#F8FAFC",transition:"all 0.2s"}}>
        <span style={{fontSize:28}}>{typeIcon}</span>
        <span style={{fontSize:13,color:"#64748B",fontWeight:500}}>Clique para anexar {typeLabel}</span>
        <span style={{fontSize:11,color:"#94A3B8"}}>PDF, XML, JPG, PNG (máx. 50MB)</span>
        <input type="file" multiple accept={tipo==="xml"?".xml,.txt,.pdf":".pdf,.jpg,.jpeg,.png,.xml"} onChange={onChange} style={{display:"none"}}/>
      </label>
      {files.length>0 && (
        <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
          {files.map((f,i)=>(
            <div key={i} style={{fontSize:12,color:"#475569",background:"#F1F5F9",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{typeIcon} {f.name}</span>
              <button onClick={()=>onChange({target:{files:null},removeIdx:i}} ) style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AuthScreen({ onLogin }) {
  const [tab, setTab] = useState("login");
  const [form, setForm] = useState({name:"",email:"",password:"",type:"transportadora"});
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const doLogin = async () => {
    setError(""); setLoading(true);
    if (form.email===ADMIN_EMAIL && form.password===ADMIN_PASS) {
      setLoading(false);
      return onLogin({id:"admin",name:"Administrador",email:ADMIN_EMAIL,type:"admin"});
    }
    const {data,error:err} = await sb.from("users").select("*").eq("email",form.email).eq("password",form.password).single();
    setLoading(false);
    if (err||!data) return setError("E-mail ou senha incorretos.");
    onLogin(data);
  };

  const doRegister = async () => {
    setError(""); setLoading(true);
    if (!form.name||!form.email||!form.password) { setLoading(false); return setError("Preencha todos os campos."); }
    const newUser = {id:genId(),name:form.name,email:form.email,password:form.password,type:form.type};
    const {error:err} = await sb.from("users").insert(newUser);
    setLoading(false);
    if (err) return setError(err.message.includes("unique")?"E-mail já cadastrado.":"Erro ao criar conta.");
    onLogin(newUser);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"14px 24px",border:"1px solid rgba(255,255,255,0.12)"}}>
            <span style={{fontSize:28}}>🚚</span>
            <div style={{textAlign:"left"}}>
              <div style={{color:"#fff",fontWeight:800,fontSize:18}}>AgendaLog</div>
              <div style={{color:"#94A3B8",fontSize:12}}>Sistema de Agendamento</div>
            </div>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:20,boxShadow:"0 40px 80px rgba(0,0,0,0.4)",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderBottom:"1px solid #F1F5F9"}}>
            {["login","register"].map(t=>(
              <button key={t} onClick={()=>{setTab(t);setError("");}} style={{padding:16,background:tab===t?"#fff":"#F8FAFC",border:"none",fontWeight:700,fontSize:14,color:tab===t?"#2563EB":"#94A3B8",cursor:"pointer",borderBottom:tab===t?"2px solid #2563EB":"2px solid transparent"}}>
                {t==="login"?"Entrar":"Criar Conta"}
              </button>
            ))}
          </div>
          <div style={{padding:28}}>
            {tab==="register" && (
              <>
                <Input label="Nome / Razão Social" placeholder="Empresa Exemplo Ltda" value={form.name} onChange={e=>set("name",e.target.value)}/>
                <div style={{marginBottom:16}}>
                  <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>Tipo de conta</label>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {["transportadora","fornecedor"].map(t=>(
                      <button key={t} onClick={()=>set("type",t)} style={{padding:10,border:`2px solid ${form.type===t?"#2563EB":"#E2E8F0"}`,borderRadius:10,background:form.type===t?"#EFF6FF":"#fff",color:form.type===t?"#2563EB":"#64748B",fontWeight:600,fontSize:13,cursor:"pointer"}}>
                        {t==="transportadora"?"🚛 Transportadora":"🏭 Fornecedor"}
                      </button>
                    ))}
                  </div>
                </div>
              </>
            )}
            <Input label="E-mail" type="email" placeholder="contato@empresa.com" value={form.email} onChange={e=>set("email",e.target.value)}/>
            <Input label="Senha" type="password" placeholder="••••••••" value={form.password} onChange={e=>set("password",e.target.value)}/>
            {error && <div style={{background:"#FEF2F2",color:"#EF4444",borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:16}}>⚠️ {error}</div>}
            <Btn style={{width:"100%"}} onClick={tab==="login"?doLogin:doRegister} disabled={loading}>
              {loading?"Aguarde...":(tab==="login"?"Entrar no sistema":"Criar minha conta")}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function NewRequestModal({ user, onClose, onCreated }) {
  const [form, setForm] = useState({nf:"",obs:"",preDate:""});
  const [nfFiles, setNfFiles] = useState([]);
  const [xmlFiles, setXmlFiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState("");
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleFileChange = (tipo, e) => {
    if (e.removeIdx !== undefined) {
      if (tipo==="nf") setNfFiles(f=>f.filter((_,i)=>i!==e.removeIdx));
      else setXmlFiles(f=>f.filter((_,i)=>i!==e.removeIdx));
      return;
    }
    const picked = Array.from(e.target.files||[]);
    if (tipo==="nf") setNfFiles(prev=>[...prev,...picked]);
    else setXmlFiles(prev=>[...prev,...picked]);
  };

  const submit = async () => {
    if (!form.nf) return alert("Informe o número da Nota Fiscal.");
    if (nfFiles.length===0) return alert("Anexe pelo menos um arquivo de Nota Fiscal.");
    setLoading(true);
    const reqId = genId();
    const uploadedFiles = [];
    try {
      setProgress("Enviando Notas Fiscais...");
      for (const f of nfFiles) {
        const r = await uploadFile(f, reqId, "nf");
        uploadedFiles.push(r);
      }
      setProgress("Enviando XMLs...");
      for (const f of xmlFiles) {
        const r = await uploadFile(f, reqId, "xml");
        uploadedFiles.push(r);
      }
      setProgress("Salvando solicitação...");
      const req = {
        id:reqId, user_id:user.id, user_name:user.name, user_type:user.type, user_email:user.email,
        nf:form.nf, obs:form.obs, pre_date:form.preDate,
        files: uploadedFiles,
        status:"Recebido",
        history:[{status:"Recebido",note:"Solicitação recebida pelo sistema.",date:new Date().toISOString()}],
      };
      const {error:err} = await sb.from("requests").insert(req);
      if (err) throw err;
      await sb.from("notifications").insert({id:genId(),to_user:"admin",req_id:reqId,msg:`Nova solicitação de ${user.name} — NF ${form.nf}`,read:false});
      setLoading(false);
      onCreated(req);
    } catch(e) {
      setLoading(false);
      setProgress("");
      alert("Erro ao enviar: "+e.message);
    }
  };

  return (
    <Modal title="Nova Solicitação de Agendamento" onClose={onClose}>
      <Input label="Número da Nota Fiscal *" placeholder="Ex: 001234" value={form.nf} onChange={e=>set("nf",e.target.value)}/>
      <Input label="Data preferencial de entrega" type="date" value={form.preDate} onChange={e=>set("preDate",e.target.value)}/>
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>Observações</label>
        <textarea value={form.obs} onChange={e=>set("obs",e.target.value)} placeholder="Informe detalhes relevantes..." rows={3}
          style={{width:"100%",padding:"10px 14px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
      </div>

      {/* Tabs de anexo */}
      <div style={{background:"#F8FAFC",borderRadius:12,padding:16,marginBottom:16,border:"1px solid #E2E8F0"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:12}}>📎 Anexar Documentos</div>
        <FileDropZone label="🧾 Nota Fiscal (PDF, imagem)" tipo="nf" files={nfFiles} onChange={e=>handleFileChange("nf",e)}/>
        <FileDropZone label="📄 Arquivo XML" tipo="xml" files={xmlFiles} onChange={e=>handleFileChange("xml",e)}/>
      </div>

      {loading && (
        <div style={{background:"#EFF6FF",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#2563EB",fontWeight:600}}>
          ⏳ {progress}
        </div>
      )}

      <div style={{display:"flex",gap:10}}>
        <Btn variant="secondary" onClick={onClose} style={{flex:1}} disabled={loading}>Cancelar</Btn>
        <Btn onClick={submit} style={{flex:2}} disabled={loading}>{loading?"Enviando...":"Enviar Solicitação"}</Btn>
      </div>
    </Modal>
  );
}

function Row({ label, value }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
      <span style={{fontSize:13,color:"#64748B",fontWeight:600,flexShrink:0}}>{label}</span>
      <span style={{fontSize:13,color:"#0F172A",textAlign:"right",wordBreak:"break-all"}}>{value}</span>
    </div>
  );
}

function FileList({ files, isAdmin }) {
  if (!files || files.length === 0) return null;
  const nfFiles = files.filter(f=>f.tipo==="nf");
  const xmlFiles = files.filter(f=>f.tipo==="xml");

  const FileItem = ({ f }) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F8FAFC",borderRadius:8,padding:"8px 12px",marginBottom:4,border:"1px solid #E2E8F0"}}>
      <span style={{fontSize:13,color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"70%"}}>
        {f.tipo==="nf"?"🧾":"📄"} {f.name}
      </span>
      {isAdmin && f.url && (
        <a href={f.url} target="_blank" download={f.name}
          style={{background:"#2563EB",color:"#fff",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,textDecoration:"none",flexShrink:0}}>
          ⬇ Baixar
        </a>
      )}
      {!isAdmin && f.url && (
        <a href={f.url} target="_blank"
          style={{color:"#2563EB",fontSize:12,fontWeight:600,textDecoration:"none",flexShrink:0}}>
          Ver
        </a>
      )}
    </div>
  );

  return (
    <div style={{marginBottom:20}}>
      {nfFiles.length>0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"#475569",marginBottom:6}}>🧾 Notas Fiscais ({nfFiles.length})</div>
          {nfFiles.map((f,i)=><FileItem key={i} f={f}/>)}
        </div>
      )}
      {xmlFiles.length>0 && (
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#475569",marginBottom:6}}>📄 Arquivos XML ({xmlFiles.length})</div>
          {xmlFiles.map((f,i)=><FileItem key={i} f={f}/>)}
        </div>
      )}
    </div>
  );
}

function RequestDetailModal({ req, isAdmin, onClose, onUpdated }) {
  const [newStatus, setNewStatus] = useState(req.status);
  const [note, setNote] = useState("");
  const [schedDate, setSchedDate] = useState("");
  const [saving, setSaving] = useState(false);

  const update = async () => {
    setSaving(true);
    const newHistory = [...(req.history||[]), {status:newStatus,note:note||`Status atualizado para "${newStatus}".`,date:new Date().toISOString()}];
    const {data,error:err} = await sb.from("requests").update({status:newStatus,sched_date:schedDate||req.sched_date||null,history:newHistory,updated_at:new Date().toISOString()}).eq("id",req.id).select().single();
    if (!err) {
      await sb.from("notifications").insert({id:genId(),to_user:req.user_id,req_id:req.id,msg:`Sua solicitação NF ${req.nf} foi atualizada: ${newStatus}`,read:false});
      setSaving(false);
      onUpdated(data);
    } else { setSaving(false); alert("Erro: "+err.message); }
  };

  return (
    <Modal title={`Solicitação — NF ${req.nf}`} onClose={onClose}>
      <div style={{background:"#F8FAFC",borderRadius:12,padding:16,marginBottom:20}}>
        <Row label="Empresa" value={`${req.user_name} (${req.user_type})`}/>
        <Row label="E-mail" value={req.user_email}/>
        <Row label="NF" value={req.nf}/>
        {req.pre_date && <Row label="Data preferencial" value={new Date(req.pre_date).toLocaleDateString("pt-BR")}/>}
        {req.sched_date && <Row label="Data agendada" value={new Date(req.sched_date).toLocaleDateString("pt-BR")}/>}
        <Row label="Aberto em" value={fmtDate(req.created_at)}/>
        {req.obs && <Row label="Obs." value={req.obs}/>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
          <span style={{fontSize:13,color:"#64748B",fontWeight:600}}>Status</span>
          <Badge status={req.status}/>
        </div>
      </div>

      <FileList files={req.files} isAdmin={isAdmin}/>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"#475569",marginBottom:10}}>Histórico</div>
        {[...(req.history||[])].reverse().map((h,i)=>(
          <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:STATUS_CONFIG[h.status]?.color||"#94A3B8",marginTop:5,flexShrink:0}}/>
            <div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <Badge status={h.status}/>
                <span style={{fontSize:11,color:"#94A3B8"}}>{fmtDate(h.date)}</span>
              </div>
              {h.note && <div style={{fontSize:12,color:"#64748B",marginTop:3}}>{h.note}</div>}
            </div>
          </div>
        ))}
      </div>

      {isAdmin && (
        <div style={{borderTop:"1px solid #F1F5F9",paddingTop:20}}>
          <div style={{fontSize:13,fontWeight:700,color:"#475569",marginBottom:12}}>Atualizar status</div>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>Novo status</label>
            <select value={newStatus} onChange={e=>setNewStatus(e.target.value)} style={{width:"100%",padding:"10px 14px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:14,outline:"none",background:"#FAFAFA"}}>
              {Object.keys(STATUS_CONFIG).map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          {newStatus==="Agendado" && <Input label="Data do agendamento" type="date" value={schedDate} onChange={e=>setSchedDate(e.target.value)}/>}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>Observação</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Ex: Divergência na OC 4521..." rows={2}
              style={{width:"100%",padding:"10px 14px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn variant="secondary" onClick={onClose} style={{flex:1}}>Fechar</Btn>
            <Btn onClick={update} style={{flex:2}} disabled={saving}>{saving?"Salvando...":"Salvar atualização"}</Btn>
          </div>
        </div>
      )}
      {!isAdmin && <Btn variant="secondary" onClick={onClose} style={{width:"100%"}}>Fechar</Btn>}
    </Modal>
  );
}

function Dashboard({ user, onLogout }) {
  const isAdmin = user.type==="admin";
  const [requests, setRequests] = useState([]);
  const [notifs, setNotifs] = useState([]);
  const [showNew, setShowNew] = useState(false);
  const [detail, setDetail] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showNotifs, setShowNotifs] = useState(false);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    setLoading(true);
    let q = sb.from("requests").select("*").order("created_at",{ascending:false});
    if (!isAdmin) q = q.eq("user_id",user.id);
    const {data:reqs} = await q;
    setRequests(reqs||[]);
    let nq = sb.from("notifications").select("*").order("date",{ascending:false});
    if (isAdmin) nq = nq.eq("to_user","admin");
    else nq = nq.eq("to_user",user.id);
    const {data:nots} = await nq;
    setNotifs(nots||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const unread = notifs.filter(n=>!n.read).length;

  const markRead = async () => {
    const key = isAdmin?"admin":user.id;
    await sb.from("notifications").update({read:true}).eq("to_user",key).eq("read",false);
    setNotifs(prev=>prev.map(n=>({...n,read:true})));
  };

  const filtered = requests.filter(r=>{
    const matchFilter = filter==="all"||r.status===filter;
    const matchSearch = !search||r.nf.includes(search)||r.user_name?.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const statusCounts = Object.keys(STATUS_CONFIG).reduce((acc,s)=>({...acc,[s]:requests.filter(r=>r.status===s).length}),{});

  return (
    <div style={{minHeight:"100vh",background:"#F1F5F9"}}>
      <header style={{background:"#0F172A",color:"#fff",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 20px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🚚</span>
          <span style={{fontWeight:800,fontSize:17}}>AgendaLog</span>
          {isAdmin && <span style={{fontSize:11,background:"#2563EB",padding:"2px 8px",borderRadius:20,fontWeight:600}}>ADMIN</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{position:"relative"}}>
            <button onClick={()=>{setShowNotifs(p=>!p);if(!showNotifs)markRead();}} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,padding:"7px 10px",cursor:"pointer",color:"#fff",fontSize:18,position:"relative",display:"flex",alignItems:"center"}}>
              🔔
              {unread>0 && <span style={{position:"absolute",top:-4,right:-4,background:"#EF4444",color:"#fff",fontSize:10,fontWeight:700,borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
            </button>
            {showNotifs && (
              <div style={{position:"absolute",right:0,top:44,background:"#fff",borderRadius:14,boxShadow:"0 10px 40px rgba(0,0,0,0.2)",width:300,zIndex:200,overflow:"hidden",border:"1px solid #E2E8F0"}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:14,color:"#0F172A"}}>Notificações</div>
                {notifs.length===0
                  ? <div style={{padding:20,textAlign:"center",color:"#94A3B8",fontSize:13}}>Nenhuma notificação</div>
                  : <div style={{maxHeight:300,overflowY:"auto"}}>
                      {notifs.slice(0,10).map(n=>(
                        <div key={n.id} onClick={async()=>{const r=requests.find(x=>x.id===n.req_id);if(!r){const{data}=await sb.from("requests").select("*").eq("id",n.req_id).single();if(data)setDetail(data);}else setDetail(r);setShowNotifs(false);}}
                          style={{padding:"10px 16px",borderBottom:"1px solid #F8FAFC",cursor:"pointer",background:n.read?"#fff":"#EFF6FF"}}>
                          <div style={{fontSize:13,color:"#0F172A"}}>{n.msg}</div>
                          <div style={{fontSize:11,color:"#94A3B8",marginTop:3}}>{fmtDate(n.date)}</div>
                        </div>
                      ))}
                    </div>
                }
              </div>
            )}
          </div>
          <div style={{fontSize:13,color:"#94A3B8",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,padding:"7px 12px",cursor:"pointer",color:"#CBD5E1",fontSize:13,fontWeight:600}}>Sair</button>
        </div>
      </header>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"24px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:20}}>
          {[["all","Total",requests.length,"📋","#0F172A"],...Object.entries(STATUS_CONFIG).map(([s,c])=>[s,s,statusCounts[s]||0,c.icon,c.color])].map(([key,label,count,icon,color])=>(
            <button key={key} onClick={()=>setFilter(key)} style={{background:filter===key?"#0F172A":"#fff",border:filter===key?"2px solid #2563EB":"2px solid transparent",borderRadius:14,padding:"14px 12px",cursor:"pointer",textAlign:"left",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
              <div style={{fontSize:20,fontWeight:800,color:filter===key?"#fff":color}}>{count}</div>
              <div style={{fontSize:11,color:filter===key?"#94A3B8":"#64748B",fontWeight:600,lineHeight:1.3}}>{label}</div>
            </button>
          ))}
        </div>

        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por NF ou empresa..."
            style={{flex:1,minWidth:200,padding:"10px 14px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:14,outline:"none",background:"#fff"}}/>
          <button onClick={load} style={{background:"#F1F5F9",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontSize:16}} title="Atualizar">🔄</button>
          {!isAdmin && <Btn onClick={()=>setShowNew(true)}>+ Nova Solicitação</Btn>}
        </div>

        {loading
          ? <div style={{textAlign:"center",padding:48,color:"#64748B",fontSize:16}}>⏳ Carregando...</div>
          : filtered.length===0
            ? <div style={{background:"#fff",borderRadius:16,padding:48,textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:48,marginBottom:12}}>📭</div>
                <div style={{color:"#64748B",fontSize:16,fontWeight:600}}>Nenhuma solicitação encontrada</div>
                {!isAdmin && <div style={{color:"#94A3B8",fontSize:14,marginTop:6}}>Clique em "+ Nova Solicitação" para começar</div>}
              </div>
            : filtered.map(req=>(
                <div key={req.id} onClick={()=>setDetail(req)}
                  style={{background:"#fff",borderRadius:14,padding:"16px 20px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:"1.5px solid #F1F5F9",marginBottom:8,display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:15,color:"#0F172A"}}>NF {req.nf}</span>
                      {isAdmin && <span style={{fontSize:12,color:"#64748B",background:"#F1F5F9",borderRadius:6,padding:"2px 8px"}}>{req.user_type==="transportadora"?"🚛":"🏭"} {req.user_name}</span>}
                      {req.files?.length>0 && (
                        <span style={{fontSize:11,color:"#2563EB",background:"#EFF6FF",borderRadius:6,padding:"2px 6px"}}>
                          📎 {req.files.filter(f=>f.tipo==="nf").length} NF · {req.files.filter(f=>f.tipo==="xml").length} XML
                        </span>
                      )}
                    </div>
                    <div style={{fontSize:12,color:"#94A3B8"}}>
                      {fmtDate(req.created_at)}
                      {req.sched_date && <> · 📅 Agendado: {new Date(req.sched_date).toLocaleDateString("pt-BR")}</>}
                      {req.pre_date && !req.sched_date && <> · Pref.: {new Date(req.pre_date).toLocaleDateString("pt-BR")}</>}
                    </div>
                    {req.obs && <div style={{fontSize:12,color:"#64748B",marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:400}}>{req.obs}</div>}
                  </div>
                  <Badge status={req.status}/>
                </div>
              ))
        }
      </div>

      {showNew && <NewRequestModal user={user} onClose={()=>setShowNew(false)} onCreated={(r)=>{setShowNew(false);load();setDetail(r);}}/>}
      {detail && <RequestDetailModal req={detail} isAdmin={isAdmin} onClose={()=>{setDetail(null);load();}} onUpdated={(u)=>{setDetail(u);load();}}/>}
      {showNotifs && <div onClick={()=>setShowNotifs(false)} style={{position:"fixed",inset:0,zIndex:150}}/>}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(()=>{try{return JSON.parse(sessionStorage.getItem("sched_session"));}catch{return null;}});
  const login = (u) => { sessionStorage.setItem("sched_session",JSON.stringify(u)); setUser(u); };
  const logout = () => { sessionStorage.removeItem("sched_session"); setUser(null); };
  return user ? <Dashboard user={user} onLogout={logout}/> : <AuthScreen onLogin={login}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
