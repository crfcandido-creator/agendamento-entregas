<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Portal de Agendamento KIT</title>
<!-- v3.0 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

/* ═══════════════════════════════════════════════════════════════════
   PORTAL DE AGENDAMENTO KIT — Design System 2025–2026
   Paleta: deep navy + gradiente violeta→azul, muito espaço, cards 20px
   Assinatura: borda-esquerda gradiente nos cards de solicitação
   ═══════════════════════════════════════════════════════════════════ */

:root {
  /* Fundos */
  --bg:           #07091A;
  --surface:      #0E1225;
  --surface2:     #151A30;
  --surface3:     #1D2340;
  --glass:        rgba(255,255,255,.04);
  --glass-border: rgba(255,255,255,.09);
  --glass-hover:  rgba(255,255,255,.07);

  /* Gradiente principal: violeta → azul */
  --g-start:      #7C3AED;
  --g-mid:        #4F46E5;
  --g-end:        #2563EB;
  --gradient:     linear-gradient(135deg,#7C3AED,#4F46E5,#2563EB);
  --gradient-h:   linear-gradient(135deg,#8B5CF6,#6366F1,#3B82F6);
  --gradient-dim: linear-gradient(135deg,rgba(124,58,237,.15),rgba(37,99,235,.15));

  /* Acentos sólidos */
  --accent:       #6366F1;
  --accent-h:     #818CF8;
  --accent-dim:   rgba(99,102,241,.18);
  --success:      #10B981;
  --warning:      #F59E0B;
  --danger:       #F43F5E;
  --purple:       #A78BFA;

  /* Texto */
  --text-1:       #EEF2FF;
  --text-2:       #94A3B8;
  --text-3:       #475569;

  /* Radii 2025 — grandes, arredondados */
  --r-xs:   10px;
  --r-sm:   14px;
  --r-md:   20px;
  --r-lg:   24px;
  --r-xl:   32px;

  /* Sombras */
  --sh-sm:  0 2px 8px rgba(0,0,0,.5);
  --sh-md:  0 8px 32px rgba(0,0,0,.55);
  --sh-lg:  0 24px 72px rgba(0,0,0,.7);
  --sh-glow:0 0 40px rgba(99,102,241,.2);
}

/* ── RESET ──────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text-1);
  -webkit-font-smoothing:antialiased;
}
input,select,textarea,button{font-family:inherit}

/* ── AMBIENT BACKGROUND GLOW (signature) ──────────────────────────────────── */
body::before{
  content:'';
  position:fixed;
  top:-200px;left:-200px;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;
  animation:drift 18s ease-in-out infinite alternate;
}
body::after{
  content:'';
  position:fixed;
  bottom:-200px;right:-100px;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(124,58,237,.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
  animation:drift 22s ease-in-out infinite alternate-reverse;
}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(40px,40px)}}
#app{position:relative;z-index:1}

/* ── BUTTONS ────────────────────────────────────────────────────────────── */
.btn{
  padding:11px 22px;
  border-radius:var(--r-sm);
  font-weight:600;font-size:14px;
  cursor:pointer;border:none;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),
             box-shadow .2s,
             filter .15s;
  letter-spacing:.01em;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);
  opacity:0;transition:opacity .15s;
}
.btn:hover::after{opacity:1}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0) scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

.btn-primary{
  background:var(--gradient);
  color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
}
.btn-primary:hover{box-shadow:0 8px 32px rgba(99,102,241,.55)}
.btn-secondary{
  background:var(--glass);
  color:var(--text-2);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(8px);
}
.btn-danger{background:linear-gradient(135deg,#F43F5E,#DC2626);color:#fff}
.btn-success{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.btn-warning{background:linear-gradient(135deg,#F59E0B,#D97706);color:#000}
.btn-purple{background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff}

/* ── FORM ELEMENTS ──────────────────────────────────────────────────────── */
.input-wrap{margin-bottom:20px}
.input-wrap label{
  display:block;font-size:11px;font-weight:700;
  color:var(--text-3);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.09em;
}
.input-wrap input,
.input-wrap select,
.input-wrap textarea{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--glass-border);
  border-radius:var(--r-sm);
  font-size:14px;outline:none;
  background:var(--surface2);
  color:var(--text-1);
  font-family:inherit;
  transition:border-color .2s, box-shadow .2s;
}
.input-wrap input::placeholder,
.input-wrap textarea::placeholder{color:var(--text-3)}
.input-wrap select option{background:var(--surface2);color:var(--text-1)}
.input-wrap input:focus,
.input-wrap select:focus,
.input-wrap textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(99,102,241,.15);
}

/* ── CARDS — arredondados 20px, muito padding, glassmorphism suave ──────── */
.card{
  background:var(--surface);
  border-radius:var(--r-md);
  padding:20px 24px;
  box-shadow:var(--sh-sm);
  border:1px solid var(--glass-border);
  margin-bottom:12px;
  cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),
             box-shadow .25s,
             border-color .2s;
  position:relative;
  overflow:hidden;
}
/* Assinatura: borda-esquerda gradiente */
.card::before{
  content:'';
  position:absolute;left:0;top:16px;bottom:16px;width:3px;
  background:var(--gradient);
  border-radius:0 2px 2px 0;
  opacity:0;
  transition:opacity .25s;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:var(--sh-md),var(--sh-glow);
  border-color:rgba(99,102,241,.3);
}
.card:hover::before{opacity:1}

/* ── MODALS ─────────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(2,4,18,.85);
  backdrop-filter:blur(12px);
  z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border-radius:var(--r-lg);
  width:100%;max-width:620px;
  max-height:93vh;overflow-y:auto;
  box-shadow:var(--sh-lg);
  border:1px solid var(--glass-border);
  animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{
  padding:24px 28px;
  border-bottom:1px solid var(--glass-border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;
  background:var(--surface);
  z-index:10;
  border-radius:var(--r-lg) var(--r-lg) 0 0;
}
.modal-body{padding:28px}
.modal-header h3{color:var(--text-1) !important}

/* ── BADGES ─────────────────────────────────────────────────────────────── */
.badge{
  border-radius:999px;
  padding:4px 12px;
  font-size:11px;font-weight:700;
  white-space:nowrap;display:inline-block;
  letter-spacing:.03em;
  backdrop-filter:blur(8px);
}

/* ── FILE ITEMS ──────────────────────────────────────────────────────────── */
.file-item{
  font-size:12px;color:var(--text-2);
  background:var(--surface2);
  border:1px solid var(--glass-border);
  border-radius:var(--r-sm);
  padding:10px 14px;margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  transition:background .15s;
}
.file-item:hover{background:var(--surface3)}

/* ── NOTIF DOT ───────────────────────────────────────────────────────────── */
.notif-dot{
  position:absolute;top:-5px;right:-5px;
  background:var(--danger);color:#fff;
  font-size:9px;font-weight:800;
  border-radius:50%;width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}

/* ── STAT CARDS ──────────────────────────────────────────────────────────── */
.stat-card{
  background:var(--surface);
  border:1px solid var(--glass-border);
  border-radius:var(--r-md);
  padding:20px 16px;
  cursor:pointer;text-align:left;
  box-shadow:var(--sh-sm);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),
             box-shadow .2s,
             border-color .2s;
  position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--gradient);
  opacity:0;transition:opacity .2s;
}
.stat-card:hover{
  transform:translateY(-3px);
  box-shadow:var(--sh-md);
  border-color:rgba(99,102,241,.3);
}
.stat-card:hover::after{opacity:1}
.stat-card.active{
  background:var(--gradient);
  border-color:transparent;
  box-shadow:0 8px 32px rgba(99,102,241,.4);
}
.stat-card.active::after{display:none}

/* ── XML INFO ────────────────────────────────────────────────────────────── */
.xml-info{
  background:var(--gradient-dim);
  border:1px solid rgba(99,102,241,.3);
  border-radius:var(--r-md);
  padding:16px 20px;margin-bottom:20px;
}
.xml-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.xml-info-item{
  background:var(--surface2);border-radius:var(--r-sm);
  padding:14px;border:1px solid var(--glass-border);text-align:center;
  transition:transform .15s;
}
.xml-info-item:hover{transform:scale(1.02)}
.xml-info-item .val{font-size:20px;font-weight:800;color:var(--text-1)}
.xml-info-item .lbl{font-size:10px;color:var(--text-3);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* ── TUTORIAL ────────────────────────────────────────────────────────────── */
.tutorial-step{
  display:flex;gap:14px;align-items:flex-start;
  padding:14px 16px;
  background:var(--surface2);
  border-radius:var(--r-sm);
  margin-bottom:10px;
  border:1px solid var(--glass-border);
  transition:transform .2s,border-color .2s;
}
.tutorial-step:hover{transform:translateX(4px);border-color:rgba(99,102,241,.3)}
.tutorial-num{
  width:30px;height:30px;border-radius:50%;
  background:var(--gradient);color:#fff;
  font-weight:800;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(99,102,241,.4);
}

/* ── TAB BAR ─────────────────────────────────────────────────────────────── */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--glass-border);
  margin-bottom:24px;overflow-x:auto;
  gap:4px;
}
.tab-btn{
  padding:11px 18px;border:none;background:none;
  font-weight:600;font-size:13px;
  color:var(--text-3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;
  border-radius:var(--r-xs) var(--r-xs) 0 0;
  transition:color .15s,background .15s;
}
.tab-btn:hover{color:var(--text-2);background:var(--glass)}
.tab-btn.active{color:var(--accent-h);border-bottom-color:var(--accent)}

/* ── INFO BOX ────────────────────────────────────────────────────────────── */
.info-box{
  background:var(--surface2);border-radius:var(--r-md);
  padding:20px;margin-bottom:24px;
  border:1px solid var(--glass-border);
}

/* ── DEADLINE BADGE ──────────────────────────────────────────────────────── */
.deadline-badge{
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:999px;margin-left:6px;
}

/* ── PICK BUTTON (upload zone) ───────────────────────────────────────────── */
.pick-btn{
  width:100%;padding:20px;
  border:2px dashed var(--glass-border);
  border-radius:var(--r-md);
  background:var(--surface2);
  cursor:pointer;font-size:13px;
  color:var(--text-3);font-weight:500;
  display:block;text-align:center;
  transition:all .2s;
}
.pick-btn:hover{
  border-color:var(--accent);
  background:var(--accent-dim);
  color:var(--accent-h);
  transform:scale(1.01);
}

/* ── USER ROW ────────────────────────────────────────────────────────────── */
.user-row{
  display:grid;grid-template-columns:auto 1fr auto;
  gap:14px;align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--glass-border);
  transition:background .15s;
}
.user-row:hover{background:var(--glass)}
.user-row:last-child{border-bottom:none}

/* ── CALENDAR DAYS ───────────────────────────────────────────────────────── */
.cal-day{
  width:38px;height:38px;
  border-radius:var(--r-xs);
  border:1px solid var(--glass-border);
  background:var(--surface2);
  font-size:13px;font-weight:600;color:var(--text-2);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s cubic-bezier(.34,1.56,.64,1);
}
.cal-day:hover{
  border-color:var(--accent);
  background:var(--accent-dim);
  color:var(--accent-h);
  transform:scale(1.1);
}
.cal-day.blocked{
  background:rgba(244,63,94,.12);
  border-color:rgba(244,63,94,.5);
  color:var(--danger);
}
.cal-day.today{
  border-color:var(--accent);
  color:var(--accent-h);
  font-weight:800;
  box-shadow:0 0 0 3px rgba(99,102,241,.2);
}
.cal-day.past{opacity:.25;cursor:not-allowed}

/* ── SCROLLBAR ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{
  background:var(--surface3);border-radius:3px;
}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ── HOVER HIGHLIGHT para itens de lista inline ──────────────────────────── */
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
</style>

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(iso){return iso?new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):""; }
function fmtDate(iso){return iso?new Date(iso+"T00:00:00").toLocaleDateString("pt-BR"):""; }
function currency(v){return v?Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}):""; }
function daysRemaining(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);var g=new Date(d+"T00:00:00");return Math.round((g-t)/86400000);}

function el(tag,attrs){
  var e=document.createElement(tag);
  var kids=Array.prototype.slice.call(arguments,2);
  for(var k in attrs||{}){
    if(k==='class')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  kids.forEach(function(k){if(k!=null)e.appendChild(typeof k==='string'?document.createTextNode(k):k);});
  return e;
}

function parseNFeXML(txt){
  try{
    var doc=new DOMParser().parseFromString(txt,"text/xml");
    function get(t){var n=doc.getElementsByTagName(t)[0];return n?n.textContent:null;}
    var vols=doc.getElementsByTagName('vol'),tv=0,tp=0;
    for(var i=0;i<vols.length;i++){var q=vols[i].getElementsByTagName('qVol')[0],p=vols[i].getElementsByTagName('pesoB')[0];if(q)tv+=parseInt(q.textContent)||0;if(p)tp+=parseFloat(p.textContent)||0;}
    var dets=doc.getElementsByTagName('det');
    return{numero:get('nNF'),emitente:get('xNome'),cnpjEmit:get('CNPJ'),valor:get('vNF'),volumes:tv||dets.length,peso:tp,itens:dets.length,valid:true};
  }catch(e){return{valid:false};}
}

function readText(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.onerror=rej;r.readAsText(file);});}

// ── UPLOAD ──────────────────────────────────────────────────────────────────
async function uploadFiles(files,reqId){
  var out=[];
  for(var i=0;i<files.length;i++){
    var f=files[i],tipo=f.__tipo||'nf';
    var ext=f.name.includes('.')?f.name.split('.').pop().toLowerCase():'bin';
    var path=reqId+'/'+tipo+'_'+genId()+'.'+ext;
    var r=await sb.storage.from(BUCKET).upload(path,f,{upsert:true});
    if(r.error)throw new Error('Falha: '+f.name+' — '+r.error.message);
    var u=sb.storage.from(BUCKET).getPublicUrl(path);
    out.push({name:f.name,path:path,url:u.data.publicUrl,tipo:tipo});
  }
  return out;
}

// ── FILE ZONE ────────────────────────────────────────────────────────────────
function makeFileZone(label,tipo,accept,arr,cb){
  var wrap=document.createElement('div');
  wrap.style.marginBottom='14px';
  var lbl=document.createElement('div');
  lbl.style.cssText='font-size:13px;font-weight:600;color:#A8B4CC;margin-bottom:6px';
  lbl.textContent=label;
  var btn=document.createElement('button');
  btn.type='button';
  btn.className='pick-btn';
  btn.textContent=(tipo==='nf'?'🧾':'📄')+' Clique para selecionar '+(tipo==='nf'?'Nota Fiscal':'XML');
  var inp=document.createElement('input');
  inp.type='file';inp.multiple=true;inp.accept=accept;inp.style.display='none';
  document.body.appendChild(inp);
  btn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();inp.click();});
  var list=document.createElement('div');list.style.marginTop='8px';
  function refresh(){
    list.innerHTML='';
    btn.style.borderColor=arr.length?'#10B981':'#CBD5E1';
    btn.style.background=arr.length?'#ECFDF5':'#F8FAFC';
    btn.style.color=arr.length?'#10B981':'#5E6E8A';
    arr.forEach(function(f,i){
      var row=el('div',{'class':'file-item'});
      var nm=document.createElement('span');nm.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=(tipo==='nf'?'🧾':'📄')+' '+f.name;
      var rm=document.createElement('button');rm.type='button';rm.style.cssText='background:none;border:none;color:#EF4444;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0';rm.textContent='×';
      rm.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();arr.splice(i,1);refresh();if(cb)cb();});
      row.appendChild(nm);row.appendChild(rm);list.appendChild(row);
    });
  }
  inp.addEventListener('change',function(){
    Array.from(inp.files).forEach(function(f){f.__tipo=tipo;arr.push(f);});
    inp.value='';refresh();if(cb)cb();
  });
  wrap.appendChild(lbl);wrap.appendChild(btn);wrap.appendChild(list);
  wrap.cleanup=function(){if(inp.parentNode)inp.parentNode.removeChild(inp);};
  wrap.refresh=refresh;
  return wrap;
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function buildAuth(){
  var tab='login',tipo='transportadora';
  var wrap=el('div',{style:'min-height:100vh;background:linear-gradient(135deg,#07091A 0%,#12082E 35%,#0A1628 70%,#07091A 100%);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden'});

// ── CALENDAR VIEW (ADMIN) ─────────────────────────────────────────────────────
async function renderCalendar(){
  var r=await sb.from('blocked_dates').select('*').order('date');
  var blocked=r.data||[];
  var today=new Date();
  var curYear=today.getFullYear(),curMonth=today.getMonth();
  function buildCalView(year,month){
    dashMain.innerHTML='';
    var wrap=el('div',{});
    var hdr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:20px'});
    hdr.appendChild(el('h2',{style:'font-size:18px;font-weight:700;color:#F0F4FF'},'📅 Datas Bloqueadas'));
    wrap.appendChild(hdr);
    // Calendar nav
    var cal=el('div',{style:'background:#0E1225;border-radius:24px;padding:28px;box-shadow:0 8px 40px rgba(0,0,0,.5);margin-bottom:24px;border:1px solid rgba(255,255,255,.07)'});
    var nav=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'});
    var months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    nav.appendChild(el('button',{type:'button','class':'btn btn-secondary',style:'padding:6px 12px',onclick:function(){if(month===0){month=11;year--;}else month--;buildCalView(year,month);}},'◀'));
    nav.appendChild(el('span',{style:'font-weight:700;font-size:16px;color:#F0F4FF'},months[month]+' '+year));
    nav.appendChild(el('button',{type:'button','class':'btn btn-secondary',style:'padding:6px 12px',onclick:function(){if(month===11){month=0;year++;}else month++;buildCalView(year,month);}},'▶'));
    cal.appendChild(nav);
    var grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center'});
    ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(function(d){grid.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:#5E6E8A;padding:4px'},d));});
    var firstDay=new Date(year,month,1).getDay();
    var daysInMonth=new Date(year,month+1,0).getDate();
    for(var i=0;i<firstDay;i++)grid.appendChild(el('div',{}));
    var blockedDates=blocked.map(function(b){return b.date;});
    for(var d=1;d<=daysInMonth;d++){
      var dateStr=year+'-'+(String(month+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
      var isPast=new Date(dateStr+'T00:00:00')<today&&dateStr!==today.toISOString().slice(0,10);
      var isToday=dateStr===today.toISOString().slice(0,10);
      var isBlocked=blockedDates.includes(dateStr);
      var dayEl=document.createElement('div');
      dayEl.className='cal-day'+(isBlocked?' blocked':isToday?' today':isPast?' past':'');
      dayEl.textContent=String(d);
      if(!isPast){
        (function(ds,isB){
          dayEl.addEventListener('click',async function(){
            if(isB){
              if(!confirm('Desbloquear '+fmtDate(ds)+'?'))return;
              await sb.from('blocked_dates').delete().eq('date',ds);
            }else{
              var reason=prompt('Motivo do bloqueio para '+fmtDate(ds)+' (opcional):');
              if(reason===null)return;
              await sb.from('blocked_dates').insert({id:genId(),date:ds,reason:reason||'Indisponível'});
            }
            var r2=await sb.from('blocked_dates').select('*').order('date');
            blocked=r2.data||[];
            APP.blockedDates=blocked.map(function(b){return b.date;});
            buildCalView(year,month);
          });
        })(dateStr,isBlocked);
      }
      grid.appendChild(dayEl);
    }
    cal.appendChild(grid);
    cal.appendChild(el('div',{style:'display:flex;gap:12px;margin-top:16px;font-size:12px;color:#A8B4CC'},
      el('span',{style:'display:flex;align-items:center;gap:4px'},el('span',{style:'width:14px;height:14px;background:#FEF2F2;border:1.5px solid #EF4444;border-radius:3px;display:inline-block'}),' Bloqueado'),
      el('span',{style:'display:flex;align-items:center;gap:4px'},el('span',{style:'width:14px;height:14px;background:#2D6BE4;border:1.5px solid #2D6BE4;border-radius:3px;display:inline-block'}),' Hoje'),
      el('span',{},'Clique para bloquear/desbloquear')
    ));
    wrap.appendChild(cal);
    // List of blocked dates
    if(blocked.length){
      var listBox=el('div',{style:'background:#0E1225;border-radius:20px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.07)'});
      listBox.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#F0F4FF;margin-bottom:12px'},'Datas bloqueadas ('+blocked.length+')'));
      blocked.forEach(function(b){
        var row=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1F5F9'});
        var info=el('div',{});
        info.appendChild(el('div',{style:'font-weight:600;font-size:14px;color:#EF4444'},'❌ '+fmtDate(b.date)));
        if(b.reason)info.appendChild(el('div',{style:'font-size:12px;color:#A8B4CC'},b.reason));
        var rm=el('button',{'class':'btn btn-danger',style:'padding:5px 10px;font-size:12px',onclick:async function(){
          await sb.from('blocked_dates').delete().eq('id',b.id);
          var r2=await sb.from('blocked_dates').select('*').order('date');
          blocked=r2.data||[];APP.blockedDates=blocked.map(function(x){return x.date;});
          buildCalView(year,month);
        }},'Remover');
        row.appendChild(info);row.appendChild(rm);listBox.appendChild(row);
      });
      wrap.appendChild(listBox);
    }
    dashMain.appendChild(wrap);
  }
  buildCalView(curYear,curMonth);
}

  ib.appendChild(row('NF',req.nf));
  if(req.pre_date)ib.appendChild(row('Data preferencial',fmtDate(req.pre_date)));
  if(req.sched_date){var days=daysRemaining(req.sched_date);ib.appendChild(row('Data agendada',fmtDate(req.sched_date)+(days<0?' ('+Math.abs(days)+'d atraso)':days===0?' (Hoje)':' (em '+days+'d)')));}
  ib.appendChild(row('Aberto em',fmt(req.created_at)));
  if(req.obs)ib.appendChild(row('Obs.',req.obs));
  var sr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-top:8px'});sr.appendChild(el('span',{style:'font-size:13px;color:#A8B4CC;font-weight:600'},'Status'));sr.appendChild(badge);ib.appendChild(sr);
  infoPanel.appendChild(ib);
  if(req.xml_data&&req.xml_data.valid){
    var xb=el('div',{'class':'xml-info'});
    xb.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:#1E40AF;margin-bottom:4px'},'📦 Dados da NF-e (XML)'));
    if(req.xml_data.emitente)xb.appendChild(el('div',{style:'font-size:12px;color:#A8B4CC;margin-bottom:8px'},req.xml_data.emitente));
    var grid2=el('div',{'class':'xml-info-grid'});
    [['Volumes',String(req.xml_data.volumes||0)],['Itens',String(req.xml_data.itens||0)],['Peso',req.xml_data.peso?req.xml_data.peso.toFixed(1)+'kg':'—'],['Valor',currency(req.xml_data.valor)]].forEach(function(x){var item=el('div',{'class':'xml-info-item'});item.appendChild(el('div',{'class':'val'},x[1]));item.appendChild(el('div',{'class':'lbl'},x[0]));grid2.appendChild(item);});
    xb.appendChild(grid2);infoPanel.appendChild(xb);
  }
  mkTab('ℹ️ Info',infoPanel);
  // Files panel
  var filesPanel=el('div',{});
  var nfFiles=(req.files||[]).filter(function(f){return f.tipo==='nf';});
  var xmlFiles=(req.files||[]).filter(function(f){return f.tipo==='xml';});
  function mkFileSection(files,label){
    if(!files.length)return null;
    var s=el('div',{style:'margin-bottom:16px'});
    s.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:#A8B4CC;margin-bottom:6px'},label+' ('+files.length+')'));
    files.forEach(function(f){
      var item=el('div',{'class':'file-item'});
      var nm=document.createElement('span');nm.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=(label.includes('NF')?'🧾':'📄')+' '+f.name;
      item.appendChild(nm);
      if(f.url){var a=el('a',{href:f.url,target:'_blank',style:'background:#2D6BE4;color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;text-decoration:none;flex-shrink:0'},'⬇ Baixar');item.appendChild(a);}
      s.appendChild(item);
    });
    if(files.length>1){s.appendChild(el('button',{'class':'btn btn-secondary',type:'button',style:'width:100%;margin-top:6px;font-size:12px',onclick:function(){files.forEach(function(f,i){if(f.url)setTimeout(function(){var a=document.createElement('a');a.href=f.url;a.target='_blank';a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);},i*800);});}}, '⬇ Baixar todos'));}
    return s;
  }
  if(!nfFiles.length&&!xmlFiles.length)filesPanel.appendChild(el('div',{style:'text-align:center;padding:32px;color:#5E6E8A'},'Nenhum arquivo'));
  var s1=mkFileSection(nfFiles,'🧾 Notas Fiscais');var s2=mkFileSection(xmlFiles,'📄 XMLs');
  if(s1)filesPanel.appendChild(s1);if(s2)filesPanel.appendChild(s2);
  if(isAdmin&&(req.files||[]).length>1)filesPanel.appendChild(el('button',{'class':'btn btn-primary',type:'button',style:'width:100%;margin-top:8px',onclick:function(){(req.files||[]).forEach(function(f,i){if(f.url)setTimeout(function(){var a=document.createElement('a');a.href=f.url;a.target='_blank';a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);},i*800);});}},'⬇ Baixar todos os arquivos'));
  mkTab('📎 Anexos',filesPanel);
  // History panel
  var histPanel=el('div',{});
  var hist=(req.history||[]).slice().reverse();
  if(!hist.length)histPanel.appendChild(el('div',{style:'text-align:center;padding:32px;color:#5E6E8A'},'Sem histórico'));
  hist.forEach(function(h){
    var hc=STATUS[h.status]||{color:'#94A3B8',bg:'#F3F4F6',icon:'•'};
    var hb=el('span',{'class':'badge',style:'background:'+hc.bg+';color:'+hc.color+';border:1px solid '+hc.color+'30'},hc.icon+' '+h.status);
    var hr=el('div',{style:'display:flex;gap:10px;align-items:flex-start;margin-bottom:12px'});
    var dot=el('div',{style:'width:8px;height:8px;border-radius:50%;background:'+hc.color+';margin-top:5px;flex-shrink:0'});
    var hi=el('div',{style:'flex:1'});
    var ht=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'});ht.appendChild(hb);ht.appendChild(el('span',{style:'font-size:11px;color:#5E6E8A'},fmt(h.date)));hi.appendChild(ht);
    if(h.note)hi.appendChild(el('div',{style:'font-size:12px;color:#A8B4CC;margin-top:3px'},h.note));
    hr.appendChild(dot);hr.appendChild(hi);histPanel.appendChild(hr);
  });
  mkTab('📋 Histórico',histPanel);
  // Admin update panel
  if(isAdmin){
    var adminPanel=el('div',{});
    var selW=el('div',{'class':'input-wrap'});selW.appendChild(el('label',{},'Novo status'));
    var sel=el('select',{style:'width:100%;padding:12px 16px;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;font-size:14px;outline:none;background:#151A30;color:#EEF2FF'});
    Object.keys(STATUS).forEach(function(s){var o=el('option',{value:s},s);if(s===req.status)o.selected=true;sel.appendChild(o);});
    selW.appendChild(sel);adminPanel.appendChild(selW);
    var sdW=el('div',{'class':'input-wrap',style:'display:none'});sdW.appendChild(el('label',{},'Data do agendamento'));
    var sdI=el('input',{type:'date',value:req.sched_date||''});sdW.appendChild(sdI);adminPanel.appendChild(sdW);
    sel.addEventListener('change',function(){sdW.style.display=['Agendado','Reagendamento Solicitado'].includes(sel.value)?'block':'none';});
    var noteW=el('div',{'class':'input-wrap'});noteW.appendChild(el('label',{},'Observação'));
    var noteI=el('textarea',{rows:'2',placeholder:'Ex: Agendado no dock 3...',style:'width:100%;padding:12px 16px;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;font-size:14px;outline:none;resize:vertical;font-family:inherit;background:#151A30;color:#EEF2FF'});noteW.appendChild(noteI);adminPanel.appendChild(noteW);
    var svBtn=el('button',{'class':'btn btn-primary',style:'width:100%',type:'button',onclick:async function(){
      svBtn.disabled=true;svBtn.textContent='Salvando...';
      var ns=sel.value;
      var nh=(req.history||[]).concat([{status:ns,note:noteI.value||'Status atualizado para "'+ns+'".',date:new Date().toISOString()}]);
      var ur=await sb.from('requests').update({status:ns,sched_date:sdI.value||req.sched_date||null,history:nh,updated_at:new Date().toISOString()}).eq('id',req.id);
      if(!ur.error){
        await sb.from('notifications').insert({id:genId(),to_user:req.user_id,req_id:req.id,msg:'Sua solicitação NF '+req.nf+' foi atualizada: '+ns,read:false});
        ov.remove();loadAll();
      }else{alert('Erro: '+ur.error.message);svBtn.disabled=false;svBtn.textContent='Salvar atualização';}
    }},'Salvar atualização');
    adminPanel.appendChild(svBtn);
    mkTab('⚙️ Atualizar',adminPanel);
  }
  tabBtns[0].classList.add('active');panels[0].style.display='block';
  body.appendChild(tabBar);panels.forEach(function(p){body.appendChild(p);});
  if(!isAdmin)body.appendChild(el('button',{'class':'btn btn-secondary',type:'button',style:'width:100%;margin-top:8px',onclick:function(){ov.remove();}},'Fechar'));
  m.appendChild(body);ov.appendChild(m);document.body.appendChild(ov);
}

// ── RESCHEDULE ────────────────────────────────────────────────────────────────
function openReschedule(req,parentOv){
  var ov=el('div',{'class':'modal-overlay',style:'z-index:1100'});
  var m=el('div',{'class':'modal',style:'max-width:420px'});
  m.appendChild(el('div',{'class':'modal-header'},el('h3',{style:'margin:0;font-size:18px;font-weight:700;color:#F0F4FF'},'🔄 Solicitar Reagendamento'),el('button',{style:'background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;width:34px;height:34px;font-size:18px;cursor:pointer;color:#94A3B8;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0',onclick:function(){ov.remove();}},'×')));
  var body=el('div',{'class':'modal-body'});
  body.appendChild(el('p',{style:'color:#A8B4CC;font-size:14px;margin-bottom:16px'},'NF '+req.nf+' agendada para '+fmtDate(req.sched_date)+'. Informe o motivo:'));
  var motivo=el('textarea',{rows:'3',placeholder:'Ex: Veículo indisponível...',style:'width:100%;padding:12px 16px;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;font-size:14px;outline:none;resize:vertical;font-family:inherit;background:#151A30;color:#EEF2FF;margin-bottom:16px'});
  var ndW=el('div',{'class':'input-wrap'});ndW.appendChild(el('label',{},'Nova data sugerida'));
  var ndI=el('input',{type:'date'});
  ndI.addEventListener('change',function(){if(APP.blockedDates.includes(ndI.value)){alert('⚠️ Data bloqueada. Escolha outra.');ndI.value='';}});
  ndW.appendChild(ndI);
  var btns=el('div',{style:'display:flex;gap:10px'});
  var send=el('button',{'class':'btn btn-warning',style:'flex:2',type:'button',onclick:async function(){
    if(!motivo.value.trim()){alert('Informe o motivo.');return;}
    send.disabled=true;send.textContent='Enviando...';
    var note='Reagendamento solicitado. Motivo: '+motivo.value+(ndI.value?' | Nova data: '+fmtDate(ndI.value):'');
    var nh=(req.history||[]).concat([{status:'Reagendamento Solicitado',note:note,date:new Date().toISOString()}]);
    var ur=await sb.from('requests').update({status:'Reagendamento Solicitado',history:nh,updated_at:new Date().toISOString()}).eq('id',req.id);
    if(!ur.error){
      await sb.from('notifications').insert({id:genId(),to_user:'admin',req_id:req.id,msg:'⚠️ Reagendamento solicitado por '+APP.user.name+' — NF '+req.nf,read:false});
      ov.remove();parentOv.remove();loadAll();
    }else{alert('Erro: '+ur.error.message);send.disabled=false;send.textContent='Enviar';}
  }},'Enviar');
  btns.appendChild(el('button',{'class':'btn btn-secondary',style:'flex:1',type:'button',onclick:function(){ov.remove();}},'Cancelar'));
  btns.appendChild(send);
  body.appendChild(motivo);body.appendChild(ndW);body.appendChild(btns);
  m.appendChild(body);ov.appendChild(m);document.body.appendChild(ov);
}

// ── DELETE REQUEST ────────────────────────────────────────────────────────────
async function deleteReq(req,ov){
  if(!confirm('Excluir solicitação NF '+req.nf+'? Esta ação não pode ser desfeita.'))return;
  var r=await sb.from('requests').delete().eq('id',req.id);
  if(r.error){alert('Erro: '+r.error.message);return;}
  ov.remove();loadAll();
}

render();
</script>
</body>
