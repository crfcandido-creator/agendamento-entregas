<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AgendaLog – Agendamento de Entregas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F1F5F9;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.btn{padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#2563EB;color:#fff}
.btn-secondary{background:#F1F5F9;color:#334155}
.input-wrap{margin-bottom:16px}
.input-wrap label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}
.input-wrap input,.input-wrap select,.input-wrap textarea{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;background:#FAFAFA;font-family:inherit}
.input-wrap input:focus,.input-wrap select:focus,.input-wrap textarea:focus{border-color:#2563EB}
.card{background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1.5px solid #F1F5F9;margin-bottom:8px;cursor:pointer;transition:all .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#CBD5E1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10}
.modal-body{padding:24px}
.badge{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap;display:inline-block}
.file-drop{display:flex;flex-direction:column;align-items:center;gap:6px;border:2px dashed #CBD5E1;border-radius:12px;padding:16px;cursor:pointer;background:#F8FAFC;transition:all .2s}
.file-drop:hover{border-color:#2563EB;background:#EFF6FF}
.file-item{font-size:12px;color:#475569;background:#F1F5F9;border-radius:8px;padding:8px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.notif-dot{position:absolute;top:-4px;right:-4px;background:#EF4444;color:#fff;font-size:10px;font-weight:700;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.stat-card{background:#fff;border:2px solid transparent;border-radius:14px;padding:14px 12px;cursor:pointer;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s}
.stat-card.active{background:#0F172A;border-color:#2563EB}
</style>
</head>

<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SURL = "https://ysygfndxnqvlfmkpfifm.supabase.co";
const SKEY = "sb_publishable_9bfnlt737VHJhdMaO33YkA_8PZETE0N";
const sb = supabase.createClient(SURL, SKEY);

const ADMIN_EMAIL = "cd.agendamento@produtoskit.com.br";
const ADMIN_PASS  = "admcastro";
const BUCKET = "arquivos";

const STATUS = {
  "Recebido":{"color":"#3B82F6","bg":"#EFF6FF","icon":"📥"},
  "Em Análise":{"color":"#F59E0B","bg":"#FFFBEB","icon":"🔍"},
  "Divergência em Ordem de Compras":{"color":"#EF4444","bg":"#FEF2F2","icon":"⚠️"},

const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmt = iso => iso ? new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "";
const el = (tag,attrs,...kids) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const k of kids){ if(k==null) continue; e.appendChild(typeof k==='string'?document.createTextNode(k):k); }
  return e;
};

let APP_STATE = {user:null};
try{ APP_STATE.user = JSON.parse(sessionStorage.getItem('agl_user')); }catch(e){}

function render(){ document.getElementById('app').replaceChildren(APP_STATE.user ? renderDashboard() : renderAuth()); }

// ── AUTH ──────────────────────────────────────────────────────────────────────
function renderAuth(){
  let tab = 'login', tipo = 'transportadora';
  const wrap = el('div',{style:'min-height:100vh;background:linear-gradient(135deg,#0F172A,#1E3A5F,#0F172A);display:flex;align-items:center;justify-content:center;padding:16px'});
  const inner = el('div',{style:'width:100%;max-width:420px'});

  const logo = el('div',{style:'text-align:center;margin-bottom:32px'},
    el('div',{style:'display:inline-flex;align-items:center;gap:12px;background:rgba(255,255,255,.08);border-radius:16px;padding:14px 24px;border:1px solid rgba(255,255,255,.12)'},
      el('span',{},'🚚'),
      el('div',{},el('div',{style:'color:#fff;font-weight:800;font-size:18px'},'AgendaLog'),el('div',{style:'color:#94A3B8;font-size:12px'},'Sistema de Agendamento'))
    )
  );

  const box = el('div',{style:'background:#fff;border-radius:20px;box-shadow:0 40px 80px rgba(0,0,0,.4);overflow:hidden'});
  const tabs = el('div',{style:'display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #F1F5F9'});

  const makeTab = (t,label) => {
    const b = el('button',{style:`padding:16px;background:#F8FAFC;border:none;font-weight:700;font-size:14px;color:#94A3B8;cursor:pointer;border-bottom:2px solid transparent`,onclick:()=>{ tab=t; refresh(); }},label);
    return b;
  };
  const tLogin = makeTab('login','Entrar');
  const tReg = makeTab('register','Criar Conta');
  tabs.append(tLogin,tReg);

  const form = el('div',{style:'padding:28px'});
  const errDiv = el('div',{style:'display:none;background:#FEF2F2;color:#EF4444;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px'});

  const inp = (label,type,ph,id) => {
    const w=el('div',{'class':'input-wrap'});
    w.append(el('label',{},label),el('input',{type,placeholder:ph,id}));
    return w;
  };

  const showErr = msg => { errDiv.textContent='⚠️ '+msg; errDiv.style.display='block'; };

  let nameWrap, typeWrap;

  const refresh = () => {
    tLogin.style.background = tab==='login'?'#fff':'#F8FAFC';
    tLogin.style.color = tab==='login'?'#2563EB':'#94A3B8';
    tLogin.style.borderBottom = tab==='login'?'2px solid #2563EB':'2px solid transparent';
    tReg.style.background = tab==='register'?'#fff':'#F8FAFC';
    tReg.style.color = tab==='register'?'#2563EB':'#94A3B8';
    tReg.style.borderBottom = tab==='register'?'2px solid #2563EB':'2px solid transparent';
    if(nameWrap) nameWrap.style.display = tab==='register'?'block':'none';
    if(typeWrap) typeWrap.style.display = tab==='register'?'block':'none';
    errDiv.style.display='none';
    submitBtn.textContent = tab==='login'?'Entrar no sistema':'Criar minha conta';
  };

  nameWrap = inp('Nome / Razão Social','text','Empresa Exemplo Ltda','auth-name');
  nameWrap.style.display='none';

  typeWrap = el('div',{style:'display:none;margin-bottom:16px'});
  typeWrap.append(el('label',{style:'display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px'},'Tipo de conta'));
  const typeGrid = el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px'});
  const mkType = (t,label) => {
    const b = el('button',{style:`padding:10px;border:2px solid #E2E8F0;border-radius:10px;background:#fff;color:#64748B;font-weight:600;font-size:13px;cursor:pointer`,onclick:()=>{ tipo=t; updateTypes(); }},label);
    return b;
  };
  const btnTrans = mkType('transportadora','🚛 Transportadora');
  const btnForn  = mkType('fornecedor','🏭 Fornecedor');
  const updateTypes = () => {
    btnTrans.style.borderColor = tipo==='transportadora'?'#2563EB':'#E2E8F0';
    btnTrans.style.background  = tipo==='transportadora'?'#EFF6FF':'#fff';
    btnTrans.style.color = tipo==='transportadora'?'#2563EB':'#64748B';
    btnForn.style.borderColor  = tipo==='fornecedor'?'#2563EB':'#E2E8F0';
    btnForn.style.background   = tipo==='fornecedor'?'#EFF6FF':'#fff';
    btnForn.style.color = tipo==='fornecedor'?'#2563EB':'#64748B';
  };
  updateTypes();
  typeGrid.append(btnTrans,btnForn);
  typeWrap.append(typeGrid);

  const emailWrap = inp('E-mail','email','contato@empresa.com','auth-email');
  const passWrap  = inp('Senha','password','••••••••','auth-pass');

  const submitBtn = el('button',{'class':'btn btn-primary',style:'width:100%',onclick:async()=>{
    errDiv.style.display='none';
    const email = document.getElementById('auth-email').value.trim();
    const pass  = document.getElementById('auth-pass').value;
    if(tab==='login'){
      if(email===ADMIN_EMAIL && pass===ADMIN_PASS){
        login({id:'admin',name:'Administrador',email:ADMIN_EMAIL,type:'admin'}); return;
      }
      submitBtn.textContent='Aguarde...'; submitBtn.disabled=true;
      const {data,error} = await sb.from('users').select('*').eq('email',email).eq('password',pass).single();
      submitBtn.disabled=false; submitBtn.textContent='Entrar no sistema';
      if(error||!data){ showErr('E-mail ou senha incorretos.'); return; }
      login(data);
    } else {
      const name = document.getElementById('auth-name').value.trim();
      if(!name||!email||!pass){ showErr('Preencha todos os campos.'); return; }
      submitBtn.textContent='Aguarde...'; submitBtn.disabled=true;
      const {error} = await sb.from('users').insert({id:genId(),name,email,password:pass,type:tipo});
      submitBtn.disabled=false; submitBtn.textContent='Criar minha conta';
      if(error){ showErr(error.message.includes('unique')?'E-mail já cadastrado.':'Erro ao criar conta.'); return; }
      login({id:genId(),name,email,type:tipo});
    }
  }},'Entrar no sistema');

  form.append(nameWrap,typeWrap,emailWrap,passWrap,errDiv,submitBtn);
  box.append(tabs,form);
  inner.append(logo,box);
  wrap.append(inner);
  return wrap;
}

function login(u){ APP_STATE.user=u; sessionStorage.setItem('agl_user',JSON.stringify(u)); render(); }
function logout(){ APP_STATE.user=null; sessionStorage.removeItem('agl_user'); render(); }

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
let dash = {requests:[],notifs:[],filter:'all',search:'',loading:true,showNotifs:false};

async function loadData(){
  dash.loading=true; renderDashContent();
  const u = APP_STATE.user; const isAdmin = u.type==='admin';
  let q = sb.from('requests').select('*').order('created_at',{ascending:false});
  if(!isAdmin) q=q.eq('user_id',u.id);
  const {data:reqs} = await q;
  dash.requests = reqs||[];
  let nq = sb.from('notifications').select('*').order('date',{ascending:false});
  if(isAdmin) nq=nq.eq('to_user','admin'); else nq=nq.eq('to_user',u.id);
  const {data:nots} = await nq;
  dash.notifs = nots||[];
  dash.loading=false; renderDashContent();
}

let dashContentEl = null;
function renderDashboard(){
  const u = APP_STATE.user; const isAdmin = u.type==='admin';
  const wrap = el('div',{});

  // Header
  const hdr = el('header',{style:'background:#0F172A;color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)'});
  const hLeft = el('div',{style:'display:flex;align-items:center;gap:10px'},
    el('span',{},'🚚'),
    el('span',{style:'font-weight:800;font-size:17px'},'AgendaLog')
  );
  if(isAdmin) hLeft.append(el('span',{style:'font-size:11px;background:#2563EB;padding:2px 8px;border-radius:20px;font-weight:600'},'ADMIN'));

  const hRight = el('div',{style:'display:flex;align-items:center;gap:12px'});

  // Notif button
  const notifWrap = el('div',{style:'position:relative'});
  const notifBtn = el('button',{style:'background:rgba(255,255,255,.08);border:none;border-radius:10px;padding:7px 10px;cursor:pointer;color:#fff;font-size:18px;position:relative',onclick:()=>{
    dash.showNotifs=!dash.showNotifs;
    if(dash.showNotifs) markNotifsRead();
    renderNotifPanel();
  }},'🔔');
  const notifDot = el('span',{'class':'notif-dot',style:'display:none'},'0');
  notifBtn.style.position='relative';
  notifBtn.append(notifDot);
  notifWrap.append(notifBtn);

  const notifPanel = el('div',{style:'position:absolute;right:0;top:44px;background:#fff;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.2);width:300px;z-index:200;overflow:hidden;border:1px solid #E2E8F0;display:none'});
  notifWrap.append(notifPanel);

  function renderNotifPanel(){
    notifPanel.style.display = dash.showNotifs?'block':'none';
    const unread = dash.notifs.filter(n=>!n.read).length;
    notifDot.style.display = unread>0?'flex':'none';
    notifDot.textContent = unread;
    notifPanel.replaceChildren(
      el('div',{style:'padding:12px 16px;border-bottom:1px solid #F1F5F9;font-weight:700;font-size:14px;color:#0F172A'},'Notificações'),
      dash.notifs.length===0
        ? el('div',{style:'padding:20px;text-align:center;color:#94A3B8;font-size:13px'},'Nenhuma notificação')
        : el('div',{style:'max-height:280px;overflow-y:auto'},
            ...dash.notifs.slice(0,10).map(n => el('div',{
              style:`padding:10px 16px;border-bottom:1px solid #F8FAFC;cursor:pointer;background:${n.read?'#fff':'#EFF6FF'}`,
              onclick:()=>{ const r=dash.requests.find(x=>x.id===n.req_id); if(r) openDetail(r); dash.showNotifs=false; renderNotifPanel(); }
            },
              el('div',{style:'font-size:13px;color:#0F172A'},n.msg),
              el('div',{style:'font-size:11px;color:#94A3B8;margin-top:3px'},fmt(n.date))
            ))
          )
    );
  }

  async function markNotifsRead(){
    const key = isAdmin?'admin':APP_STATE.user.id;
    await sb.from('notifications').update({read:true}).eq('to_user',key).eq('read',false);
    dash.notifs = dash.notifs.map(n=>({...n,read:true}));
    renderNotifPanel();
  }

  hRight.append(
    notifWrap,
    el('span',{style:'font-size:13px;color:#94A3B8;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'},u.name),
    el('button',{style:'background:rgba(255,255,255,.08);border:none;border-radius:10px;padding:7px 12px;cursor:pointer;color:#CBD5E1;font-size:13px;font-weight:600',onclick:logout},'Sair')
  );
  hdr.append(hLeft,hRight);

  dashContentEl = el('div',{style:'max-width:1000px;margin:0 auto;padding:24px 16px'});
  wrap.append(hdr,dashContentEl);

  // Close notifs on outside click
  document.addEventListener('click',e=>{ if(!notifWrap.contains(e.target)){ dash.showNotifs=false; renderNotifPanel(); }});

  loadData().then(()=>renderNotifPanel());
  return wrap;
}

function renderDashContent(){
  if(!dashContentEl) return;
  const u = APP_STATE.user; const isAdmin = u.type==='admin';
  const filtered = dash.requests.filter(r=>{
    const mf = dash.filter==='all'||r.status===dash.filter;
    const ms = !dash.search||r.nf.includes(dash.search)||r.user_name?.toLowerCase().includes(dash.search.toLowerCase());
    return mf&&ms;
  });

  const counts = {};
  for(const s of Object.keys(STATUS)) counts[s]=dash.requests.filter(r=>r.status===s).length;

  // Stat cards
  const statsRow = el('div',{style:'display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px'});
  const mkStat = (key,label,count,icon,color) => {
    const c = el('div',{'class':'stat-card'+(dash.filter===key?' active':''),onclick:()=>{ dash.filter=key; renderDashContent(); }});
    c.append(
      el('div',{style:'font-size:18px;margin-bottom:4px'},icon),
      el('div',{style:`font-size:20px;font-weight:800;color:${dash.filter===key?'#fff':color}`},String(count)),
      el('div',{style:`font-size:11px;font-weight:600;line-height:1.3;color:${dash.filter===key?'#94A3B8':'#64748B'}`},label)
    );
    return c;
  };
  statsRow.append(mkStat('all','Total',dash.requests.length,'📋','#0F172A'));
  for(const [s,c] of Object.entries(STATUS)) statsRow.append(mkStat(s,s,counts[s]||0,c.icon,c.color));

  // Toolbar
  const toolbar = el('div',{style:'display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap'});
  const searchInp = el('input',{type:'text',placeholder:'Buscar por NF ou empresa...',style:'flex:1;min-width:200px;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;background:#fff',value:dash.search});
  searchInp.addEventListener('input',e=>{ dash.search=e.target.value; renderDashContent(); });
  const refreshBtn = el('button',{style:'background:#F1F5F9;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:16px',onclick:loadData},'🔄');
  toolbar.append(searchInp,refreshBtn);
  if(!isAdmin){
    const newBtn = el('button',{'class':'btn btn-primary',onclick:openNewRequest},'+ Nova Solicitação');
    toolbar.append(newBtn);
  }

  // List
  let listEl;
  if(dash.loading){
    listEl = el('div',{style:'text-align:center;padding:48px;color:#64748B;font-size:16px'},'⏳ Carregando...');
  } else if(filtered.length===0){
    listEl = el('div',{style:'background:#fff;border-radius:16px;padding:48px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)'},
      el('div',{style:'font-size:48px;margin-bottom:12px'},'📭'),
      el('div',{style:'color:#64748B;font-size:16px;font-weight:600'},'Nenhuma solicitação encontrada')
    );
  } else {
    listEl = el('div',{});
    for(const req of filtered){
      const nfCount = (req.files||[]).filter(f=>f.tipo==='nf').length;
      const xmlCount = (req.files||[]).filter(f=>f.tipo==='xml').length;
      const cfg = STATUS[req.status]||{color:'#6B7280',bg:'#F3F4F6',icon:'•'};
      const badge = el('span',{'class':'badge',style:`background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}30`},`${cfg.icon} ${req.status}`);
      const top = el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap'});
      top.append(el('span',{style:'font-weight:700;font-size:15px;color:#0F172A'},`NF ${req.nf}`));
      if(isAdmin) top.append(el('span',{style:'font-size:12px;color:#64748B;background:#F1F5F9;border-radius:6px;padding:2px 8px'},`${req.user_type==='transportadora'?'🚛':'🏭'} ${req.user_name}`));
      if(nfCount||xmlCount) top.append(el('span',{style:'font-size:11px;color:#2563EB;background:#EFF6FF;border-radius:6px;padding:2px 6px'},`📎 ${nfCount} NF · ${xmlCount} XML`));
      const sub = el('div',{style:'font-size:12px;color:#94A3B8'},fmt(req.created_at));
      if(req.sched_date) sub.append(document.createTextNode(` · 📅 ${new Date(req.sched_date).toLocaleDateString('pt-BR')}`));
      const card = el('div',{'class':'card',style:'display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center',onclick:()=>openDetail(req)});
      const left = el('div',{});
      left.append(top,sub);
      if(req.obs) left.append(el('div',{style:'font-size:12px;color:#64748B;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px'},req.obs));
      card.append(left,badge);
      listEl.append(card);
    }
  }

  dashContentEl.replaceChildren(statsRow,toolbar,listEl);
}

// ── NEW REQUEST ────────────────────────────────────────────────────────────────
function openNewRequest(){
  let nfFiles=[], xmlFiles=[];
  const overlay = el('div',{'class':'modal-overlay'});
  const modal = el('div',{'class':'modal'});
  const hdr = el('div',{'class':'modal-header'},
    el('h3',{style:'margin:0;font-size:18px;font-weight:700;color:#0F172A'},'Nova Solicitação'),
    el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:()=>overlay.remove()},'×')
  );
  const body = el('div',{'class':'modal-body'});

  const nfWrap=el('div',{'class':'input-wrap'}); nfWrap.append(el('label',{},'Número da Nota Fiscal *'));
  const nfInput=el('input',{type:'text',placeholder:'Ex: 001234',id:'new-nf'}); nfWrap.append(nfInput);
  const dateWrap=el('div',{'class':'input-wrap'}); dateWrap.append(el('label',{},'Data preferencial'));
  const dateInput=el('input',{type:'date',id:'new-date'}); dateWrap.append(dateInput);
  const obsWrap=el('div',{'class':'input-wrap'}); obsWrap.append(el('label',{},'Observações'));
  const obsInput=el('textarea',{rows:'3',placeholder:'Informe detalhes relevantes...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit'}); obsWrap.append(obsInput);

  // File zones
  const filesBox = el('div',{style:'background:#F8FAFC;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #E2E8F0'});
  filesBox.append(el('div',{style:'font-size:13px;font-weight:700;color:#0F172A;margin-bottom:12px'},'📎 Anexar Documentos'));

  const makeFileZone = (label, tipo, accept) => {
    const zone = el('div',{style:'margin-bottom:16px'});
    zone.append(el('label',{style:'display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px'},label));
    const dropLbl = el('label',{'class':'file-drop'});
    dropLbl.append(el('span',{style:'font-size:28px'},tipo==='nf'?'🧾':'📄'),
      el('span',{style:'font-size:13px;color:#64748B;font-weight:500'},`Clique para anexar ${tipo==='nf'?'Nota Fiscal':'XML'}`),
      el('span',{style:'font-size:11px;color:#94A3B8'},'PDF, XML, JPG, PNG (máx. 50MB)'));
    const fileInput = el('input',{type:'file',multiple:'true',accept,style:'display:none'});
    fileInput.addEventListener('change',e=>{
      const picked = Array.from(e.target.files);
      if(tipo==='nf') nfFiles=[...nfFiles,...picked]; else xmlFiles=[...xmlFiles,...picked];
      refreshFileList();
    });
    dropLbl.append(fileInput);
    zone.append(dropLbl);
    const listEl2 = el('div',{});
    zone.append(listEl2);
    function refreshFileList(){
      const files = tipo==='nf'?nfFiles:xmlFiles;
      listEl2.replaceChildren(...files.map((f,i)=>el('div',{'class':'file-item'},
        el('span',{},`${tipo==='nf'?'🧾':'📄'} ${f.name}`),
        el('button',{style:'background:none;border:none;color:#EF4444;cursor:pointer;font-size:16px',onclick:()=>{ if(tipo==='nf') nfFiles=nfFiles.filter((_,idx)=>idx!==i); else xmlFiles=xmlFiles.filter((_,idx)=>idx!==i); refreshFileList(); }},'×')
      )));
    }
    return zone;
  };

  filesBox.append(makeFileZone('🧾 Nota Fiscal (PDF, imagem)','nf','.pdf,.jpg,.jpeg,.png,.xml'));
  filesBox.append(makeFileZone('📄 Arquivo XML','xml','.xml,.txt,.pdf'));

  const progress = el('div',{style:'display:none;background:#EFF6FF;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#2563EB;font-weight:600'});

  const btns = el('div',{style:'display:flex;gap:10px'});
  const cancelBtn = el('button',{'class':'btn btn-secondary',style:'flex:1',onclick:()=>overlay.remove()},'Cancelar');
  const submitBtn = el('button',{'class':'btn btn-primary',style:'flex:2',onclick:async()=>{
    const nf = nfInput.value.trim();
    if(!nf){ alert('Informe o número da Nota Fiscal.'); return; }
    if(nfFiles.length===0){ alert('Anexe pelo menos um arquivo de Nota Fiscal.'); return; }
    submitBtn.disabled=true; submitBtn.textContent='Enviando...';
    const reqId = genId(); const uploaded=[];
    try{
      progress.style.display='block';
      progress.textContent='⏳ Enviando Notas Fiscais...';
      for(const f of nfFiles){
        const ext=f.name.split('.').pop();
        const path=`${reqId}/nf_${genId()}.${ext}`;
        const {error:ue} = await sb.storage.from(BUCKET).upload(path,f,{upsert:true});
        if(ue) throw ue;
        const {data:ud} = sb.storage.from(BUCKET).getPublicUrl(path);
        uploaded.push({name:f.name,path,url:ud.publicUrl,tipo:'nf'});
      }
      progress.textContent='⏳ Enviando XMLs...';
      for(const f of xmlFiles){
        const ext=f.name.split('.').pop();
        const path=`${reqId}/xml_${genId()}.${ext}`;
        const {error:ue} = await sb.storage.from(BUCKET).upload(path,f,{upsert:true});
        if(ue) throw ue;
        const {data:ud} = sb.storage.from(BUCKET).getPublicUrl(path);
        uploaded.push({name:f.name,path,url:ud.publicUrl,tipo:'xml'});
      }
      progress.textContent='⏳ Salvando solicitação...';
      const req={id:reqId,user_id:APP_STATE.user.id,user_name:APP_STATE.user.name,user_type:APP_STATE.user.type,user_email:APP_STATE.user.email,
        nf,obs:obsInput.value,pre_date:dateInput.value,files:uploaded,status:'Recebido',
        history:[{status:'Recebido',note:'Solicitação recebida pelo sistema.',date:new Date().toISOString()}]};
      const {error:re} = await sb.from('requests').insert(req);
      if(re) throw re;
      await sb.from('notifications').insert({id:genId(),to_user:'admin',req_id:reqId,msg:`Nova solicitação de ${APP_STATE.user.name} — NF ${nf}`,read:false});
      overlay.remove(); loadData();
    }catch(e){ alert('Erro: '+e.message); submitBtn.disabled=false; submitBtn.textContent='Enviar Solicitação'; progress.style.display='none'; }
  }},'Enviar Solicitação');
  btns.append(cancelBtn,submitBtn);

  body.append(nfWrap,dateWrap,obsWrap,filesBox,progress,btns);
  modal.append(hdr,body);
  overlay.append(modal);
  document.body.append(overlay);
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(req){
  const isAdmin = APP_STATE.user.type==='admin';
  const overlay = el('div',{'class':'modal-overlay'});
  const modal = el('div',{'class':'modal'});

  const cfg = STATUS[req.status]||{color:'#6B7280',bg:'#F3F4F6',icon:'•'};
  const badge = el('span',{'class':'badge',style:`background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}30`},`${cfg.icon} ${req.status}`);

  const hdr = el('div',{'class':'modal-header'},
    el('h3',{style:'margin:0;font-size:18px;font-weight:700;color:#0F172A'},`Solicitação — NF ${req.nf}`),
    el('button',{style:'background:none;border:none;font-size:22px;cursor:pointer;color:#94A3B8',onclick:()=>overlay.remove()},'×')
  );
  const body = el('div',{'class':'modal-body'});

  // Info box
  const info = el('div',{style:'background:#F8FAFC;border-radius:12px;padding:16px;margin-bottom:20px'});
  const row=(l,v)=>{ const d=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:6px'}); d.append(el('span',{style:'font-size:13px;color:#64748B;font-weight:600;flex-shrink:0'},l),el('span',{style:'font-size:13px;color:#0F172A;text-align:right;word-break:break-all'},v)); return d; };
  info.append(row('Empresa',`${req.user_name} (${req.user_type})`),row('E-mail',req.user_email),row('NF',req.nf));
  if(req.pre_date) info.append(row('Data preferencial',new Date(req.pre_date).toLocaleDateString('pt-BR')));
  if(req.sched_date) info.append(row('Data agendada',new Date(req.sched_date).toLocaleDateString('pt-BR')));
  info.append(row('Aberto em',fmt(req.created_at)));
  if(req.obs) info.append(row('Obs.',req.obs));
  const statusRow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-top:8px'}); statusRow.append(el('span',{style:'font-size:13px;color:#64748B;font-weight:600'},'Status'),badge); info.append(statusRow);
  body.append(info);

  // Files
  const nfFiles=(req.files||[]).filter(f=>f.tipo==='nf');
  const xmlFiles=(req.files||[]).filter(f=>f.tipo==='xml');
  if(nfFiles.length||xmlFiles.length){
    const filesSection=el('div',{style:'margin-bottom:20px'});
    const mkFileSection=(files,label)=>{
      if(!files.length) return null;
      const s=el('div',{style:'margin-bottom:12px'});
      s.append(el('div',{style:'font-size:13px;font-weight:700;color:#475569;margin-bottom:6px'},`${label} (${files.length})`));
      for(const f of files){
        const item=el('div',{'class':'file-item'});
        item.append(el('span',{style:'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%'},`${label.includes('NF')?'🧾':'📄'} ${f.name}`));
        if(f.url){
          const a=el('a',{href:f.url,target:'_blank',style:'background:#2563EB;color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;text-decoration:none;flex-shrink:0'},'⬇ Baixar');
          item.append(a);
        }
        s.append(item);
      }
      return s;
    };
    const s1=mkFileSection(nfFiles,'🧾 Notas Fiscais');
    const s2=mkFileSection(xmlFiles,'📄 Arquivos XML');
    if(s1) filesSection.append(s1);
    if(s2) filesSection.append(s2);
    body.append(filesSection);
  }

  // History
  const histSection=el('div',{style:'margin-bottom:20px'});
  histSection.append(el('div',{style:'font-size:13px;font-weight:700;color:#475569;margin-bottom:10px'},'Histórico'));
  const hist=[...(req.history||[])].reverse();
  for(const h of hist){
    const hcfg=STATUS[h.status]||{color:'#94A3B8',bg:'#F3F4F6',icon:'•'};
    const hbadge=el('span',{'class':'badge',style:`background:${hcfg.bg};color:${hcfg.color};border:1px solid ${hcfg.color}30`},`${hcfg.icon} ${h.status}`);
    const hrow=el('div',{style:'display:flex;gap:10px;align-items:flex-start;margin-bottom:10px'});
    const dot=el('div',{style:`width:8px;height:8px;border-radius:50%;background:${hcfg.color};margin-top:5px;flex-shrink:0`});
    const hinfo=el('div',{});
    const htop=el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'}); htop.append(hbadge,el('span',{style:'font-size:11px;color:#94A3B8'},fmt(h.date)));
    hinfo.append(htop);
    if(h.note) hinfo.append(el('div',{style:'font-size:12px;color:#64748B;margin-top:3px'},h.note));
    hrow.append(dot,hinfo); histSection.append(hrow);
  }
  body.append(histSection);

  // Admin controls
  if(isAdmin){
    const adminSec=el('div',{style:'border-top:1px solid #F1F5F9;padding-top:20px'});
    adminSec.append(el('div',{style:'font-size:13px;font-weight:700;color:#475569;margin-bottom:12px'},'Atualizar status'));
    const selWrap=el('div',{'class':'input-wrap'}); selWrap.append(el('label',{},'Novo status'));
    const sel=el('select',{style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;background:#FAFAFA'});
    for(const s of Object.keys(STATUS)) sel.append(el('option',{value:s,selected:s===req.status?'true':undefined},s));
    selWrap.append(sel); adminSec.append(selWrap);

    const dateWrap2=el('div',{'class':'input-wrap',style:'display:none'}); dateWrap2.append(el('label',{},'Data do agendamento'));
    const dateInp2=el('input',{type:'date'}); dateWrap2.append(dateInp2); adminSec.append(dateWrap2);
    sel.addEventListener('change',()=>{ dateWrap2.style.display=sel.value==='Agendado'?'block':'none'; });

    const noteWrap=el('div',{'class':'input-wrap'}); noteWrap.append(el('label',{},'Observação'));
    const noteInp=el('textarea',{rows:'2',placeholder:'Ex: Divergência na OC 4521...',style:'width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit'}); noteWrap.append(noteInp); adminSec.append(noteWrap);

    const btns2=el('div',{style:'display:flex;gap:10px'});
    const closeBtn=el('button',{'class':'btn btn-secondary',style:'flex:1',onclick:()=>overlay.remove()},'Fechar');
    const saveBtn=el('button',{'class':'btn btn-primary',style:'flex:2',onclick:async()=>{
      saveBtn.disabled=true; saveBtn.textContent='Salvando...';
      const ns=sel.value;
      const newHist=[...(req.history||[]),{status:ns,note:noteInp.value||`Status atualizado para "${ns}".`,date:new Date().toISOString()}];
      const {data,error}=await sb.from('requests').update({status:ns,sched_date:dateInp2.value||req.sched_date||null,history:newHist,updated_at:new Date().toISOString()}).eq('id',req.id).select().single();
      if(!error){
        await sb.from('notifications').insert({id:genId(),to_user:req.user_id,req_id:req.id,msg:`Sua solicitação NF ${req.nf} foi atualizada: ${ns}`,read:false});
        overlay.remove(); loadData();
      } else { alert('Erro: '+error.message); saveBtn.disabled=false; saveBtn.textContent='Salvar atualização'; }
    }},'Salvar atualização');
    btns2.append(closeBtn,saveBtn); adminSec.append(btns2);
    body.append(adminSec);
  } else {
    body.append(el('button',{'class':'btn btn-secondary',style:'width:100%',onclick:()=>overlay.remove()},'Fechar'));
  }

  modal.append(hdr,body); overlay.append(modal); document.body.append(overlay);
}

render();
</script>
</body>
</html>
